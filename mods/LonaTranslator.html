// ── TAG COLOR SYSTEM ─────────────────────────────────────────
// Ciano  = traduzível (\board, \optB, \optD)
// Âmbar  = opaca (\C[6], \n, \m[...])
// Azul   = escape (\\)
const _TAGS_TRADUZ_RE = /^\\(board|optB|optD)\[/i;
const _TAG_ESCAPE_RE  = /^\\\\/;

function _tagColor(tag){
  if(_TAG_ESCAPE_RE.test(tag))  return {color:"#38bdf8",bg:"rgba(56,189,248,0.10)"};
  if(_TAGS_TRADUZ_RE.test(tag)) return {color:"#22d3ee",bg:"rgba(34,211,238,0.12)"};
  return                               {color:"#f59e0b",bg:"rgba(245,158,11,0.12)"};
}

function temTagsTraduz(text){
  if(!text) return false;
  return /\\(board|optB|optD)\[/i.test(text);
}

function TagText({text}){
  if(!text) return <span style={{color:"#4b5563",fontStyle:"italic"}}>— vazio —</span>;
  const parts=text.split(/(\\\\|\\[A-Za-z_]+(?:\[[^\]]*\])?)/g);
  return <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.8,wordBreak:"break-all"}}>
    {parts.map((p,i)=>{
      if(!p.startsWith("\\")) return <span key={i} style={{color:"#e2e8f0"}}>{p}</span>;
      const {color,bg}=_tagColor(p);
      return <span key={i} style={{color,background:bg,borderRadius:3,padding:"0 3px",fontSize:11}}>{p}</span>;
    })}
  </span>;
}

// ── PAGINAÇÃO ─────────────────────────────────────────────────
const PAGE_SIZES=[25,50,100,200];
function Pagination({total,page,pageSize,onPage,onPageSize}){
  const totalPages=Math.ceil(total/pageSize);
  if(!total) return null;
  const start=(page-1)*pageSize+1, end=Math.min(page*pageSize,total);
  const maxW=7; let pages=[];
  if(totalPages<=maxW){ pages=Array.from({length:totalPages},(_,i)=>i+1); }
  else{
    const half=Math.floor(maxW/2);
    let lo=Math.max(1,page-half), hi=lo+maxW-1;
    if(hi>totalPages){hi=totalPages;lo=hi-maxW+1;}
    pages=Array.from({length:hi-lo+1},(_,i)=>lo+i);
  }
  const b={background:"transparent",border:"1px solid #1e2d3d",borderRadius:5,
    padding:"4px 8px",cursor:"pointer",color:"#64748b",fontSize:11,
    fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",
    justifyContent:"center",minWidth:28,height:26};
  const ba={...b,background:"#0ea5e9",border:"1px solid #0ea5e9",color:"white",fontWeight:700};
  const bd={...b,opacity:0.25,cursor:"default"};
  return <div style={{padding:"7px 20px",borderTop:"1px solid #1e2d3d",background:"#090e14",
    display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
    <span style={{color:"#334155",fontSize:11,fontFamily:"'JetBrains Mono',monospace",minWidth:160}}>
      {start.toLocaleString()}–{end.toLocaleString()} de <strong style={{color:"#475569"}}>{total.toLocaleString()}</strong>
    </span>
    <div style={{display:"flex",gap:3,alignItems:"center"}}>
      <button style={page===1?bd:b} onClick={()=>page>1&&onPage(1)} disabled={page===1}><Icon name="first" size={11}/></button>
      <button style={page===1?bd:b} onClick={()=>page>1&&onPage(page-1)} disabled={page===1}><Icon name="prev" size={11}/></button>
      {pages[0]>1&&<><button style={b} onClick={()=>onPage(1)}>1</button>{pages[0]>2&&<span style={{color:"#334155",padding:"0 2px",fontSize:12}}>…</span>}</>}
      {pages.map(p=><button key={p} style={p===page?ba:b} onClick={()=>onPage(p)}>{p}</button>)}
      {pages[pages.length-1]<totalPages&&<>{pages[pages.length-1]<totalPages-1&&<span style={{color:"#334155",padding:"0 2px",fontSize:12}}>…</span>}<button style={b} onClick={()=>onPage(totalPages)}>{totalPages}</button></>}
      <button style={page===totalPages?bd:b} onClick={()=>page<totalPages&&onPage(page+1)} disabled={page===totalPages}><Icon name="next" size={11}/></button>
      <button style={page===totalPages?bd:b} onClick={()=>page<totalPages&&onPage(totalPages)} disabled={page===totalPages}><Icon name="last" size={11}/></button>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <span style={{color:"#334155",fontSize:11}}>Ir:</span>
      <input type="number" min={1} max={totalPages} defaultValue={page}
        onKeyDown={e=>{if(e.key==="Enter"){const v=parseInt(e.target.value);if(v>=1&&v<=totalPages)onPage(v);}}}
        style={{width:48,background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:5,
          color:"#94a3b8",padding:"3px 6px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",textAlign:"center"}}/>
    </div>
    <div style={{flex:1}}/>
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <span style={{color:"#334155",fontSize:11}}>Por página:</span>
      <div style={{display:"flex",gap:3}}>
        {PAGE_SIZES.map(n=><button key={n} style={n===pageSize?ba:b}
          onClick={()=>{onPageSize(n);onPage(1);}}>{n}</button>)}
      </div>
    </div>
  </div>;
}

function TagVerificadorSaida({srvOnline, tagsSaida, setTagsSaida, onNavProblems}){
  const {estado, resultado} = tagsSaida;

  const verificar = async () => {
    if(!srvOnline){ alert("Servidor offline. Inicie servidor.py primeiro."); return; }
    setTagsSaida({estado:"carregando", resultado:null});
    try {
      const r = await API.get("/api/verificar-tags-saida");
      setTagsSaida({estado: r.erro ? "erro" : "ok", resultado: r});
    } catch(e) {
      setTagsSaida({estado:"erro", resultado:{erro: String(e)}});
    }
  };

  const temQuebradas = resultado && !resultado.erro && resultado.quebradas > 0;
  const tudo_ok      = resultado && !resultado.erro && resultado.quebradas === 0;

  return <div style={{marginTop:14,background:"#0b1219",border:`1px solid ${temQuebradas?"#78350f":"#1e2d3d"}`,
    borderRadius:8,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
    {/* Ícone de status */}
    <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,
      background: tudo_ok?"#0d2d1a" : temQuebradas?"#78350f22" : "#111827",
      border:`2px solid ${tudo_ok?"#22c55e" : temQuebradas?"#f59e0b" : "#1e2d3d"}`,
      display:"flex",alignItems:"center",justifyContent:"center",
      color: tudo_ok?"#22c55e" : temQuebradas?"#f59e0b" : "#475569",
      fontSize:13}}>
      {tudo_ok?"✓" : temQuebradas?"!" : "🏷"}
    </div>

    {/* Texto de status */}
    <div style={{flex:1,minWidth:0}}>
      <div style={{color:"#e2e8f0",fontWeight:600,fontSize:13}}>Integridade de Tags — PT-BR\</div>
      <div style={{color:"#334155",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
        {estado==="carregando" && "Verificando..."}
        {estado==="erro"       && <span style={{color:"#f87171"}}>{resultado?.erro}</span>}
        {tudo_ok  && <span style={{color:"#4ade80"}}>✓ {resultado.total} diálogos verificados — nenhuma tag quebrada</span>}
        {temQuebradas && <>
          <span style={{color:"#f59e0b"}}>{resultado.quebradas} tags quebradas em {resultado.total} diálogos</span>
          <span style={{color:"#0ea5e9",marginLeft:10,cursor:"pointer",textDecoration:"underline",fontSize:11}}
            onClick={onNavProblems}>→ ver em Problemas</span>
        </>}
        {estado==="idle" && "Verifica se os arquivos gerados têm as mesmas tags que o ENG original"}
      </div>
    </div>

    {/* Botão verificar */}
    <button onClick={estado==="carregando" ? undefined : verificar}
      disabled={estado==="carregando"}
      style={{background:"rgba(245,158,11,0.1)",border:"1px solid #92400e",borderRadius:6,
        padding:"5px 13px",color:"#f59e0b",fontSize:11,cursor:estado==="carregando"?"wait":"pointer",
        fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",opacity:estado==="carregando"?0.7:1,
        flexShrink:0}}>
      {estado==="carregando" ? "⏳ Verificando..." : "🔍 Verificar"}
    </button>
  </div>;
}

  const db2bPendente   = dbStats?.db2b_pendente      || 0;
  const totalDB3stats  = dbStats?.total              || 0;  // total real do DB3
  // Total de strings no idioma refLang selecionado (vem do servidor)
  const langKeyMap={"eng":"db2_n_eng","cht":"db2_n_cht","kor":"db2_n_kor","rus":"db2_n_rus","ukt":"db2_n_ukt","ptbrc":"db2_n_ptbrc"};
  const totalRefLang   = dbStats?.[langKeyMap[refLang]] ?? totalDB2;
  const LANG_LABELS_REF={"eng":"ENG","cht":"CHT","kor":"KOR","rus":"RUS","ukt":"UKR","ptbrc":"PT-BRC"};
  const totalDB3       = (srvAprov+srvTraduz+srvErros)||0;
  // total usa DB3 como base (banco de trabalho real), com fallback para DB2b/DB2
  const total          = (totalDB3stats||totalDB2b||totalDB2||totalDB3||entries.length)||1;
  const aproveitados   = srvAprov;
  const traduzidos     = srvTraduz;
  const erros          = srvErros;
  // ok = aproveitados + traduzidos. revisaoOk é subconjunto de traduzidos (não soma dupla)
  const ok             = aproveitados+traduzidos;
  const pendenteReal   = Math.max(0, total - ok - erros);
  const [actionMsg,setActionMsg]=useState(null);
  const [criandoDb3,setCriandoDb3]=useState(false);

  const criarDb3=async()=>{
    if(!srvOnline) return;
    setCriandoDb3(true);
    try{
      const r=await API.post("/api/db3/criar",{force:false});
      setActionMsg({ok:r.ok,msg:r.msg||"Erro ao criar DB3"});
      if(r.ok){
        const st=await API.get("/api/status");
        if(st?.dbs) setDbStatus(st.dbs);
        if(st?.stats) setDbStats(st.stats);
        if(st?.langs) setLangsDisponiveis(st.langs);
        const dat=await API.get("/api/entries");
        if(dat?.entries) setEntries(dat.entries);
      }
    }catch(e){ setActionMsg({ok:false,msg:"Erro: "+String(e)}); }
    finally{ setCriandoDb3(false); setTimeout(()=>setActionMsg(null),5000); }
  };

  const run=async(step,opts={},label)=>{
    if(!srvOnline){setActionMsg({ok:false,msg:"Servidor offline — inicie com: python servidor.py"});setTimeout(()=>setActionMsg(null),3500);return;}
    setActionMsg({running:true,msg:`Executando: ${label}...`});
    const r=await onPipeline(step,opts);
    setActionMsg({ok:r?.ok,msg:r?.ok?`${label} concluído ✓`:(r?.error||`${label} falhou`)});
    setTimeout(()=>setActionMsg(null),4000);
  };

  const db3Ok=srvOnline&&dbStatus?.db3;
  const db2Ok=srvOnline&&dbStatus?.db2;
  const db1Ok=srvOnline&&dbStatus?.db1;
  const ptbrOk=srvOnline&&dbStatus?.ptbr_gerado;

  const db2Langs=(langsDisponiveis||[]).filter(l=>l!=="pt").join(" · ").toUpperCase()||"ENG";
  const dbs=[
    {id:"DB1",label:"Estrutura CHT",
     ok:db1Ok,
     count:db1Ok?`${dbStats?.db1_arquivos||"?"} arquivos · ${dbStats?.db1_dialogos||"?"} diálogos`:"pendente — execute [1]",
     color:db1Ok?"#22c55e":"#4b5563"},
    {id:"DB2",label:"Todos idiomas",
     ok:db2Ok,
     count:db2Ok?`${totalDB2.toLocaleString()} diálogos · ${db2Langs}`:"pendente — execute [3]",
     color:db2Ok?"#22c55e":"#4b5563"},
    {id:"DB2b",label:"Fila API",
     ok:srvOnline&&dbStatus?.db2b,
     count:srvOnline&&dbStatus?.db2b?(totalDB2b>0?`${totalDB2b.toLocaleString()} total · ${db2bPendente.toLocaleString()} pendentes`:"fila carregada"):"pendente — execute [3]",
     color:srvOnline&&dbStatus?.db2b?"#22c55e":"#4b5563"},
    {id:"DB3",label:"Tradução PT-BR",
     ok:db3Ok,
     count:db3Ok?`${srvAprov.toLocaleString()} aproveit · ${srvTraduz.toLocaleString()} traduz · ${erros} erros · ${tagsBad} tags${revisaoOk>0?` · ✎ ${revisaoOk} rev.`:""}`:(srvOnline&&dbStatus?.db2b?"clique para criar DB3":"pendente — execute [4]"),
     color:db3Ok?(erros>0?"#f59e0b":"#22c55e"):(srvOnline&&dbStatus?.db2b?"#f97316":"#4b5563"),
     criavel:srvOnline&&dbStatus?.db2b&&!db3Ok},
  ];

  const steps=[
    {n:1,label:"Extrair estrutura CHT",desc:"Indexa arquivos e marcadores do jogo",db:"→ DB1",done:db1Ok,warn:false,
     btn:"Reextrair",btnStyle:"neutral",action:()=>run("extrator",{},"Extrator DB1")},
    {n:2,label:"Atualizar após patch",desc:"Detecta mudanças em nova versão do jogo",db:"→ DB1",done:db1Ok,warn:false,
     btn:"Verificar mudanças",btnStyle:"neutral",action:()=>run("atualizador",{},"Atualizador")},
    {n:3,label:"Extrair todos os idiomas",desc:"Importa ENG/CHT/KOR/RUS/UKR/PT-BRC",db:"→ DB2",done:db2Ok,warn:false,
     btn:"Reextrair",btnStyle:"neutral",action:()=>run("extrator_db2",{},"Extrator DB2")},
    {n:4,label:"Traduzir via API",desc:`Modelo ativo: ${apiModelo}`,db:"→ DB3",done:db3Ok,warn:erros>0,
     btn:"Teste (5 itens)",btnStyle:"info",action:()=>{
       const a=apiOpts.find(o=>o.val===apiModelo)||apiOpts[0];
       run("traduzir_teste",{modelo:apiModelo,provider:a.provider,fonte_lang:refLang},"Teste API");
     },
     btn2:erros>0?"Reenviar erros":null,btnStyle2:"warn",action2:()=>{
       const a=apiOpts.find(o=>o.val===apiModelo)||apiOpts[0];
       run("reenviar",{modelo:apiModelo,provider:a.provider,fonte_lang:refLang},"Reenviar erros");
     },
     btn3:"Traduzir tudo",btnStyle3:"primary",action3:()=>{
       const a=apiOpts.find(o=>o.val===apiModelo)||apiOpts[0];
       run("traduzir",{modelo:apiModelo,provider:a.provider,fonte_lang:refLang},"Tradução completa");
     }},
    {n:5,label:"Revisar traduções",desc:"Edite entradas nesta interface",db:"DB3",done:false,warn:false,
     btn:null},
    {n:6,label:"Gerar arquivos PT-BR",desc:"Reconstrói os .txt para o diretório PT-BR\\",db:"→ PT-BR\\",done:ptbrOk,warn:false,
     btn:"Simular (dry-run)",btnStyle:"neutral",action:()=>run("gerador_dry",{},"Simulação"),
     btn2:"Ver relatório",btnStyle2:"neutral",action2:()=>run("gerador_rel",{},"Relatório"),
     btn3:"Gerar todos",btnStyle3:"primary",action3:()=>run("gerador",{},"Gerador")},
  ];

  const btnColors={
    primary:{bg:"rgba(14,165,233,0.12)",border:"#0369a1",color:"#0ea5e9"},
    warn:   {bg:"rgba(245,158,11,0.1)", border:"#92400e",color:"#f59e0b"},
    info:   {bg:"rgba(99,102,241,0.1)", border:"#3730a3",color:"#818cf8"},
    neutral:{bg:"rgba(71,85,105,0.1)", border:"#1e2d3d",color:"#64748b"},
  };
  const Btn=({label,style,onClick,running})=>{
    const c=btnColors[style]||btnColors.neutral;
    return <button onClick={onClick} disabled={running} style={{background:c.bg,border:`1px solid ${c.border}`,
      borderRadius:6,padding:"5px 13px",color:c.color,fontSize:11,cursor:running?"wait":"pointer",
      fontFamily:"'JetBrains Mono',monospace",opacity:running?0.6:1,whiteSpace:"nowrap"}}>{label}</button>;
  };

  return <div style={{padding:"24px 28px",overflowY:"auto",height:"100%"}}>
    <div style={{marginBottom:22}}>
      <div style={{color:"#475569",fontSize:11,letterSpacing:"0.18em",fontFamily:"'JetBrains Mono',monospace",marginBottom:5}}>VISÃO GERAL</div>
      <div style={{display:"flex",alignItems:"baseline",gap:12}}>
        <h2 style={{color:"#f1f5f9",fontSize:20,fontWeight:700,margin:0}}>LonaRPG · Tradução PT-BR</h2>
        {!srvOnline&&<span style={{color:"#f97316",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>⚠ offline</span>}
      </div>
    </div>

    {/* Desbloquear se pipeRunning travou sem SSE */}
    {pipeRunning&&<div style={{marginBottom:10,background:"#1c0a00",border:"1px solid #7c2d12",
      borderRadius:8,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span style={{color:"#f97316",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
        ⟳ Processo ativo: {pipeRunning} — se travar, clique para desbloquear
      </span>
      <button onClick={()=>{if(typeof setPipeRunning==="function")setPipeRunning(null);}}
        style={{background:"rgba(245,158,11,0.1)",border:"1px solid #92400e",borderRadius:5,
        padding:"3px 10px",color:"#fbbf24",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
        Desbloquear
      </button>
    </div>}
    {/* Feedback de ação */}
    {actionMsg&&<div style={{marginBottom:14,background:actionMsg.running?"#0c1520":actionMsg.ok?"#0d2d1a":"#1c0a00",
      border:`1px solid ${actionMsg.running?"#1e2d3d":actionMsg.ok?"#166534":"#7c2d12"}`,
      borderRadius:8,padding:"9px 14px",color:actionMsg.running?"#94a3b8":actionMsg.ok?"#4ade80":"#f97316",
      fontSize:12,fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:8}}>
      {actionMsg.running&&<span style={{display:"inline-block",width:10,height:10,border:"2px solid",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>}
      {actionMsg.msg}
    </div>}

    {/* Cards DB */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
      {dbs.map(d=><div key={d.id}
        onClick={d.criavel?criarDb3:undefined}
        style={{background:"#0f1923",border:`1px solid ${d.criavel?"#f97316":"#1e2d3d"}`,borderRadius:10,
          padding:"14px 16px",borderTop:`2px solid ${d.color}55`,
          cursor:d.criavel?"pointer":"default"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{d.id}</span>
          <span style={{width:7,height:7,borderRadius:"50%",background:d.color,display:"block",
            boxShadow:d.ok?`0 0 7px ${d.color}`:"none"}}/>
        </div>
        <div style={{color:"#e2e8f0",fontWeight:600,fontSize:13,marginBottom:3}}>{d.label}</div>
        <div style={{color:d.criavel?"#f97316":"#475569",fontSize:10,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.5}}>
          {criandoDb3&&d.id==="DB3"?"⏳ criando...":d.count}
        </div>
        {d.criavel&&!criandoDb3&&<div style={{marginTop:5,fontSize:9,color:"#f97316",
          fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em"}}>✦ clique para criar</div>}
      </div>)}
    </div>

    {/* Barra progresso — aparece com DB2b (antes mesmo do DB3) */}
    {(db3Ok||(srvOnline&&(dbStatus?.db2b||dbStatus?.db2)))&&<div style={{background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:10,
      padding:"16px 20px",marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <span style={{color:"#64748b",fontSize:11,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace"}}>PROGRESSO GERAL</span>
        <span style={{color:"#e2e8f0",fontFamily:"'JetBrains Mono',monospace",fontSize:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {/* Lado esquerdo: OK / total */}
          <span>
            {ok.toLocaleString()}<span style={{color:"#475569"}}>/{total.toLocaleString()} OK ({Math.round(ok*100/total)}%)</span>
          </span>
          {/* Revisão humana badge — aparece só se houver */}
          {revisaoOk>0&&<span style={{background:"rgba(167,139,250,0.12)",border:"1px solid #5b21b6",
            borderRadius:4,padding:"1px 8px",fontSize:11,color:"#a78bfa",fontWeight:700,
            display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:10}}>✎</span> {revisaoOk.toLocaleString()} revisados
          </span>}
          <span style={{color:"#334155",fontSize:11}}>·</span>
          {/* Lado direito: faltam X strings do idioma selecionado */}
          {(()=>{
            const faltam=Math.max(0, totalRefLang - ok);
            const pctFeito=totalRefLang>0?Math.round(ok*100/totalRefLang):0;
            return <span style={{background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:4,
              padding:"2px 9px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,
              display:"flex",alignItems:"center",gap:5}}>
              <span style={{color:"#334155",fontSize:10}}>faltam</span>
              <span style={{color:faltam===0?"#22c55e":faltam<500?"#fbbf24":"#f97316",fontWeight:700}}>
                {faltam.toLocaleString()}
              </span>
              <span style={{color:"#334155",fontSize:10}}>/ {totalRefLang.toLocaleString()} {LANG_LABELS_REF[refLang]||refLang.toUpperCase()}</span>
              <span style={{color:"#1e2d3d"}}>·</span>
              <span style={{color:pctFeito===100?"#22c55e":"#475569",fontSize:10}}>{pctFeito}%</span>
            </span>;
          })()}
        </span>
      </div>
      {/* Barra segmentada */}
      <div style={{height:8,borderRadius:6,background:"#1e2d3d",overflow:"hidden",display:"flex",marginBottom:12}}>
        <div title="PT-BRC aproveitado" style={{width:`${aproveitados*100/total}%`,background:"#16a34a",transition:"width 0.5s"}}/>
        {/* Revisão humana ocupa fatia de traduzidos (subconjunto visual) */}
        <div title="Revisão humana" style={{width:`${revisaoOk*100/total}%`,background:"#7c3aed",transition:"width 0.5s"}}/>
        <div title="Traduzido (GPT/DS)" style={{width:`${Math.max(0,traduzidos-revisaoOk)*100/total}%`,background:"#22c55e",transition:"width 0.5s"}}/>
        <div title="Tags alteradas" style={{width:`${tagsBad*100/total}%`,background:"#f59e0b",transition:"width 0.5s"}}/>
        <div title="Erros" style={{width:`${erros*100/total}%`,background:"#ef4444",transition:"width 0.5s"}}/>
        <div style={{flexGrow:1,background:"#1e293b"}}/>
      </div>
      {/* Legenda */}
      <div style={{display:"flex",gap:18,flexWrap:"wrap",alignItems:"center"}}>
        {[
          {c:"#16a34a",l:"PT-BRC aproveitado",  v:aproveitados},
          {c:"#22c55e",l:"Traduzido (GPT/DS)",   v:traduzidos},
          {c:"#7c3aed",l:"Revisão humana",        v:revisaoOk, icon:"✎", always:true},
          {c:"#f59e0b",l:"Tags alteradas",        v:tagsBad},
          {c:"#ef4444",l:"Erros",                 v:erros},
          pendenteReal>0?{c:"#334155",l:"Sem tradução",v:pendenteReal,highlight:true}:null,
        ].filter(Boolean).filter(s=>s.always||s.v>0||s.highlight).map(s=>
          <div key={s.l} style={{display:"flex",alignItems:"center",gap:5}}>
            {s.icon
              ?<span style={{fontSize:12,color:s.c,fontWeight:700,lineHeight:1}}>{s.icon}</span>
              :<span style={{width:9,height:9,borderRadius:2,background:s.c,display:"block",flexShrink:0,
                border:s.highlight?"1px solid #475569":"none"}}/>}
            <span style={{color:s.v>0?"#64748b":"#334155",fontSize:11}}>{s.l}</span>
            <span style={{color:s.highlight?"#f97316":s.v>0?"#e2e8f0":"#334155",fontSize:11,
              fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{s.v.toLocaleString()}</span>
            {/* Badge pendente de revisão */}
            {s.l==="Revisão humana"&&revisaoPend>0&&<span style={{background:"rgba(251,191,36,0.1)",
              border:"1px solid #92400e",borderRadius:3,padding:"0 5px",fontSize:10,
              color:"#fbbf24",fontFamily:"'JetBrains Mono',monospace"}}>
              {revisaoPend} pendente{revisaoPend>1?"s":""}
            </span>}
          </div>)}
      </div>
    </div>}

    {/* Etapas */}
    <div style={{color:"#475569",fontSize:11,letterSpacing:"0.18em",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>ETAPAS DO PIPELINE</div>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {steps.map(s=>{
        const isRunning=!!pipeRunning;
        return <div key={s.n} style={{background:"#0b1219",border:`1px solid ${s.warn?"#78350f":"#1e2d3d"}`,
          borderRadius:8,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,
            background:s.done?(s.warn?"#78350f22":"#0d2d1a"):"#111827",
            border:`2px solid ${s.done?(s.warn?"#f59e0b":"#22c55e"):"#1e2d3d"}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            color:s.done?(s.warn?"#f59e0b":"#22c55e"):"#475569",
            fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
            {s.done?(s.warn?"!":"✓"):s.n}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:s.done?"#e2e8f0":"#64748b",fontWeight:600,fontSize:13}}>{s.label}</div>
            <div style={{color:"#334155",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{s.desc} <span style={{color:"#1e2d3d"}}>{s.db}</span></div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {s.btn&&<Btn label={s.btn} style={s.btnStyle} onClick={s.action} running={isRunning}/>}
            {s.btn2&&<Btn label={s.btn2} style={s.btnStyle2} onClick={s.action2} running={isRunning}/>}
            {s.btn3&&<Btn label={s.btn3} style={s.btnStyle3} onClick={s.action3} running={isRunning}/>}
          </div>
        </div>;
      })}
    </div>
    {/* Verificador de integridade de tags */}
    <div style={{marginTop:20}}>
      <div style={{color:"#475569",fontSize:11,letterSpacing:"0.18em",fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>DIAGNÓSTICO</div>
      <TagVerificadorSaida srvOnline={srvOnline} tagsSaida={tagsSaida} setTagsSaida={setTagsSaida} onNavProblems={onNavProblems}/>
    </div>

    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;
}

// ══════════════════════════════════════════════════════════════
// VISUALIZADOR (paginação completa + debounce)
// ══════════════════════════════════════════════════════════════
function ViewerScreen({onEdit,entries,setEntries,onPipeline,langs=["eng","pt","cht","kor","rus","ukt"],srvOnline,dbStatus,setDbStatus,setDbStats,setLangsDisponiveis,apiModelo="gpt-4o-mini",apiOpts=[],refLang="cht"}){
  const [search,setSearch]=useState("");
  const [debSearch,setDebSearch]=useState("");

  const [baseLang,setBaseLang]=useState("eng");
  const [cmpLang,setCmpLang]=useState("pt");
  // Seleção: APENAS pageEntries visíveis — nunca acumula cross-página
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [page,setPage]=useState(1);
  const [pageSize,setPageSize]=useState(50);
  const timerRef=useRef();

  useEffect(()=>{
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(()=>{setDebSearch(search);setPage(1);},300);
    return ()=>clearTimeout(timerRef.current);
  },[search]);

  // Reset seleção quando filtro/busca mudar
  useEffect(()=>{ setSelectedIds(new Set()); },[page,modeloFiltro,debSearch,pageSize]);

  const getText=(e,lang)=>{
    if(lang==="eng")   return e.eng;
    if(lang==="pt")    return e.pt;
    if(lang==="cht")   return e.cht;
    if(lang==="kor")   return e.kor||null;
    if(lang==="rus")   return e.rus||null;
    if(lang==="ukt")   return e.ukt||null;
    if(lang==="ptbrc") return e.ptbrc||null;
    return null;
  };

  // ── FILTRO ÚNICO — categorias exclusivas ─────────────────────────────────
  const [modeloFiltro, setModeloFiltro] = useState("todos");

  const CATS = [
    {k:"todos",      label:"Todos",        col:"#64748b", pred:()=>true},
    {k:"pendente",   label:"Pendente",      col:"#f97316", pred:e=>{const s=e.status||"";return s===""||s==="pendente";}},
    {k:"aproveitado",label:"Aproveitado",   col:"#16a34a", pred:e=>e.status==="aproveitado"},
    {k:"traduzido",  label:"Traduzido",     col:"#22c55e", pred:e=>e.status==="traduzido"&&e.modelo!=="manual"&&e.status_revisao!=="ok"},
    {k:"gpt",        label:"GPT",           col:"#38bdf8", pred:e=>(e.modelo||"").toLowerCase().startsWith("gpt")},
    {k:"deepseek",   label:"DeepSeek",      col:"#818cf8", pred:e=>(e.modelo||"").toLowerCase().includes("deepseek")},
    {k:"correcao",   label:"✎ Correção",    col:"#c084fc", pred:e=>e.modelo==="manual"||e.status_revisao==="ok"},
    {k:"revisao",    label:"⚑ Revisão",     col:"#fb923c", pred:e=>e.status_revisao==="pendente"},
    {k:"tagsbad",    label:"⚠ Tags ruins",  col:"#fbbf24", pred:e=>e.status!=="erro"&&!e.tags_ok},
    {k:"erro",       label:"Erro",          col:"#f87171", pred:e=>e.status==="erro"},
  ];

  // Contadores — sempre sobre o total de entries
  const cats = useMemo(()=>{
    const c={};
    CATS.forEach(({k,pred})=>{ c[k]=entries.filter(pred).length; });
    return c;
  },[entries]);

  // Lista filtrada = predicado de categoria + busca textual
  const filtered = useMemo(()=>{
    const cat=CATS.find(c=>c.k===modeloFiltro)||CATS[0];
    return entries.filter(e=>{
      if(!cat.pred(e)) return false;
      if(debSearch){
        const q=debSearch.toLowerCase();
        const baseText=(getText(e,baseLang)||"").toLowerCase();
        if(!e.full_key.toLowerCase().includes(q)&&
           !e.arquivo.toLowerCase().includes(q)&&
           !(e.eng||"").toLowerCase().includes(q)&&
           !(e.pt||"").toLowerCase().includes(q)&&
           !baseText.includes(q)) return false;
      }
      return true;
    });
  },[entries,modeloFiltro,debSearch,baseLang]);


  const pageEntries=useMemo(()=>filtered.slice((page-1)*pageSize,page*pageSize),[filtered,page,pageSize]);

  // ── helpers de seleção — SOMENTE sobre pageEntries (visível na tela) ──────────────────────────
  const selected=selectedIds; // alias para uso no JSX
  const allPageSel=pageEntries.length>0&&pageEntries.every(e=>selectedIds.has(e.id));
  const anyPageSel=pageEntries.some(e=>selectedIds.has(e.id));
  const allFilterSel=allPageSel;
  const toggleAll=()=>{
    if(allPageSel){ setSelectedIds(new Set()); }
    else          { setSelectedIds(new Set(pageEntries.map(e=>e.id))); }
  };
  const selAll=()=>setSelectedIds(new Set(pageEntries.map(e=>e.id)));
  const clrSel=()=>setSelectedIds(new Set());
  const toggleSel=(id)=>setSelectedIds(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const [markMsg,setMarkMsg]=useState(null);
  // Opera SOMENTE nos IDs passados — que são sempre subconjunto de pageEntries
  // applyMark: 1 request bulk para o servidor (evita concorrência SQLite com N requests paralelos)
  const applyMark=(ids,localUpdater,bulkPayload,msg)=>{
    if(!ids||ids.length===0) return;
    const allIds=ids.map(Number).filter(id=>!isNaN(id));
    if(allIds.length===0) return;
    const allSet=new Set(allIds);
    // Atualiza estado local imediatamente — todos os selecionados
    setEntries(prev=>prev.map(e=>allSet.has(Number(e.id))?localUpdater(e):e));
    // Apenas IDs positivos existem no DB3 e podem ser salvos no servidor
    const dbIds=allIds.filter(id=>id>0);
    if(dbIds.length>0){
      const entradas=allIds.map(id=>{const e=entries.find(x=>x.id===id)||{};return {arquivo:e.arquivo,full_key:e.full_key,...bulkPayload};}).filter(e=>e.arquivo&&e.full_key);
    if(entradas.length>0) API.post("/api/revisao/save",{entradas}).catch(()=>{});
    }
    setMarkMsg(msg(allIds.length));
    setTimeout(()=>setMarkMsg(null),2500);
    clrSel();
  };
  const markRevisao=(ids,val)=>applyMark(ids,
    e=>({...e,status_revisao:val}),
    {status_revisao:val},
    n=>val==="pendente"?`⚑ ${n} marcados para revisão`:`⚐ ${n} desmarcados`
  );
  const markCorrecao=(ids)=>applyMark(ids,
    e=>({...e,modelo:"manual",status_revisao:"ok"}),
    {status_revisao:"ok",modelo:"manual"},
    n=>`✎ ${n} marcados como Correção Humana`
  );
  const unmarkCorrecao=(ids)=>applyMark(ids,
    e=>({...e,modelo:"",status_revisao:""}),
    {status_revisao:"",modelo:""},
    n=>`⚐ ${n} desmarcados`
  );



  // Contador de strings por idioma — sincronizado com filtro ativo
  const baseCount=useMemo(()=>
    filtered.filter(e=>{const t=getText(e,baseLang); return t!=null&&t!=="";}).length
  ,[filtered,baseLang,getText]);


  const LANG_LABELS={"eng":"ENG","pt":"PT-BR","cht":"CHT","kor":"KOR","rus":"RUS","ukt":"UKR","ptbrc":"PT-BRC"};
  const langOpts=useMemo(()=>{
    const base=langs.includes("pt")?langs:["eng","pt",...langs.filter(l=>l!=="eng")];
    return base.map(l=>({val:l,label:LANG_LABELS[l]||l.toUpperCase()}));
  },[langs]);

  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {/* ── BARRA DE FILTRO ÚNICA ── */}
    <div style={{display:"flex",gap:4,padding:"7px 14px 6px",background:"#060d15",
      borderBottom:"1px solid #0a1520",flexWrap:"wrap",alignItems:"center"}}>
      <span style={{color:"#334155",fontSize:9,fontFamily:"'JetBrains Mono',monospace",
        letterSpacing:"0.12em",marginRight:3}}>FILTRO</span>
      {CATS.map(({k,label,col})=>{
        const act=modeloFiltro===k;
        const cnt=cats[k]??0;
        return <button key={k} onClick={()=>{setModeloFiltro(k);setPage(1);}} style={{
          background:act?col+"28":"transparent",
          border:`1px solid ${act?col:"#1e2d3d"}`,
          borderRadius:6,padding:"3px 9px",cursor:"pointer",
          display:"flex",alignItems:"center",gap:4,transition:"all 0.12s"}}>
          <span style={{color:act?col:"#475569",fontSize:11,
            fontFamily:"'JetBrains Mono',monospace",fontWeight:act?700:400}}>{label}</span>
          <span style={{color:act?col:"#334155",fontSize:10,fontWeight:700,
            background:act?col+"18":"#0a1520",border:`1px solid ${act?col+"44":"#1a2535"}`,
            borderRadius:3,padding:"0 4px",fontFamily:"'JetBrains Mono',monospace"}}>
            {cnt.toLocaleString()}
          </span>
        </button>;
      })}
    </div>

    {/* Toolbar */}
    <div style={{padding:"10px 20px",borderBottom:"1px solid #1e2d3d",background:"#090e14",
      display:"flex",gap:9,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{position:"relative",flex:1,minWidth:200}}>
        <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#334155",pointerEvents:"none"}}>
          <Icon name="search" size={13}/>
        </span>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Buscar arquivo, chave, ENG ou PT-BR..."
          style={{width:"100%",paddingLeft:30,paddingRight:12,paddingTop:7,paddingBottom:7,
            background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:7,
            color:"#e2e8f0",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}/>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",
          transform:"translateY(-50%)",background:"none",border:"none",color:"#475569",cursor:"pointer",padding:0}}>
          <Icon name="close" size={12}/>
        </button>}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{color:"#334155",fontSize:11}}>Base
          <span style={{marginLeft:5,color:"#475569",fontSize:10,fontFamily:"'JetBrains Mono',monospace",
            background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:3,padding:"1px 6px"}}>
            {baseCount.toLocaleString()}
          </span>
        </span>
        <select value={baseLang} onChange={e=>setBaseLang(e.target.value)} style={{
          background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:5,
          color:"#94a3b8",padding:"4px 7px",fontSize:12,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          {langOpts.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}
        </select>
        <span style={{color:"#334155",fontSize:11}}>↔</span>
        <select value={cmpLang} onChange={e=>setCmpLang(e.target.value)} style={{
          background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:5,
          color:"#94a3b8",padding:"4px 7px",fontSize:12,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          {langOpts.map(o=><option key={o.val} value={o.val}>{o.label}</option>)}
        </select>
      </div>
      {selected.size>0&&<div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",
        padding:"3px 0",borderTop:"1px solid #1e2d3d",width:"100%",marginTop:4}}>
        {/* contador */}
        <span style={{color:"#94a3b8",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
          background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:5,padding:"2px 8px",
          display:"flex",alignItems:"center",gap:4}}>
          <Icon name="check" size={10}/>{selected.size} selecionados
        </span>
        {/* selecionar TODOS os filtrados / limpar */}
        {!allFilterSel
          ? <button onClick={selAll} style={{background:"rgba(14,165,233,0.07)",border:"1px solid #0369a1",
              borderRadius:6,padding:"4px 10px",color:"#38bdf8",fontSize:11,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace"}}>
              sel. página ({pageEntries.length})
            </button>
          : <button onClick={clrSel} style={{background:"rgba(14,165,233,0.07)",border:"1px solid #0369a1",
              borderRadius:6,padding:"4px 10px",color:"#38bdf8",fontSize:11,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace"}}>
              limpar seleção
            </button>
        }
        {/* marcar para revisão */}
        <button onClick={()=>{
          const ids=[...selectedIds];
          if(ids.length===0){alert("Nenhum entry selecionado.");return;}
          markRevisao(ids,"pendente");
        }}
          title="Marca para revisão — só entries desta página"
          style={{background:"rgba(249,115,22,0.09)",border:"1px solid #c2410c",
          borderRadius:6,padding:"4px 10px",color:"#f97316",fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          ⚑ para revisão
        </button>
        {/* desmarcar revisão */}
        <button onClick={()=>{
          const ids=[...selectedIds];
          markRevisao(ids,"");
        }}
          style={{background:"rgba(71,85,105,0.07)",border:"1px solid #1e2d3d",
          borderRadius:6,padding:"4px 10px",color:"#475569",fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          ⚐ desmarcar
        </button>
        {/* marcar como correção humana */}
        <button onClick={()=>{
          const ids=[...selectedIds];
          if(ids.length===0){alert("Nenhum entry selecionado.");return;}
          markCorrecao(ids);
        }}
          style={{background:"rgba(192,132,252,0.09)",border:"1px solid #7c3aed",
          borderRadius:6,padding:"4px 10px",color:"#c084fc",fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          ✎ Correção Humana
        </button>
        {/* desmarcar correção */}
        <button onClick={()=>{
          const ids=[...selectedIds];
          unmarkCorrecao(ids);
        }}
          style={{background:"rgba(71,85,105,0.07)",border:"1px solid #1e2d3d",
          borderRadius:6,padding:"4px 10px",color:"#475569",fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          ✎ desmarcar correção
        </button>
        {/* reenviar para API */}
        {onPipeline&&<button onClick={()=>{const a=(apiOpts||[]).find(o=>o.val===apiModelo)||{provider:"gpt"};onPipeline("reenviar",{ids:[...selected].join(","),modelo:apiModelo,provider:a.provider,fonte_lang:refLang});clrSel();}}
          style={{background:"rgba(34,197,94,0.07)",border:"1px solid #166534",
          borderRadius:6,padding:"4px 10px",color:"#4ade80",fontSize:11,cursor:"pointer",
          display:"flex",gap:4,alignItems:"center",fontFamily:"'JetBrains Mono',monospace"}}>
          <Icon name="send" size={10}/> reenviar API
        </button>}
        {/* fechar barra */}
        <button onClick={clrSel} style={{background:"transparent",marginLeft:"auto",
          border:"1px solid #1e2d3d",borderRadius:6,padding:"4px 7px",color:"#475569",cursor:"pointer"}}>
          <Icon name="close" size={11}/>
        </button>
      </div>}
      {markMsg&&<div style={{padding:"5px 14px",background:"rgba(249,115,22,0.08)",
        borderBottom:"1px solid #c2410c33",color:"#f97316",fontSize:11,
        fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:6}}>
        {markMsg}
      </div>}
      {/* Legenda de cores de tags */}
      <div style={{padding:"4px 20px",borderTop:"1px solid #0a1520",background:"#060c12",
        display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{color:"#334155",fontSize:9,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}}>TAGS</span>
        {[
          {c:"#22d3ee",bg:"rgba(34,211,238,0.12)", label:"traduzível", ex:"\\board[...]  \\optB[...]  \\optD[...]"},
          {c:"#f59e0b",bg:"rgba(245,158,11,0.12)",  label:"opaca",      ex:"\\C[6]  \\n  \\m[...]"},
          {c:"#38bdf8",bg:"rgba(56,189,248,0.10)",  label:"escape",     ex:"\\\\"},
        ].map(({c,bg,label,ex})=>
          <div key={label} style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{color:c,background:bg,borderRadius:3,padding:"1px 7px",
              fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{ex}</span>
            <span style={{color:"#334155",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>{label}</span>
          </div>
        )}
      </div>
    </div>
    {/* Cabeçalho */}
    <div style={{display:"grid",gridTemplateColumns:"28px 200px 1fr 1fr 90px 68px",
      padding:"6px 20px",borderBottom:"1px solid #1e2d3d",background:"#090e14",alignItems:"center"}}>
      <div onClick={toggleAll} title={allPageSel?"Desmarcar página":"Selecionar página"}
        style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:13,height:13,borderRadius:3,
          border:"1px solid "+(allPageSel?"#0ea5e9":anyPageSel?"#0ea5e966":"#1e2d3d"),
          background:allPageSel?"#0ea5e9":anyPageSel?"#0ea5e926":"transparent",
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          {allPageSel&&<Icon name="check" size={9}/>}
          {!allPageSel&&anyPageSel&&<span style={{color:"#0ea5e9",fontSize:10,lineHeight:1,fontWeight:700}}>−</span>}
        </div>
      </div>
      {["Chave","BASE","COMPARAR","Status","Ação"].map((h,i)=>
        <div key={i} style={{color:"#1e2d3d",fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em"}}>{h}</div>)}
    </div>
    {/* Linhas */}
    <div style={{flex:1,overflowY:"auto",minHeight:0}}>
      {pageEntries.length===0&&<div style={{padding:32,color:"#334155",fontFamily:"'JetBrains Mono',monospace",fontSize:13,textAlign:"center"}}>Nenhuma entrada encontrada.</div>}
      {pageEntries.map(entry=><div key={entry.id} onClick={()=>toggleSel(entry.id)} style={{
        display:"grid",gridTemplateColumns:"28px 200px 1fr 1fr 90px 68px",
        padding:"8px 20px",borderBottom:"1px solid #0a1520",alignItems:"start",cursor:"pointer",
        background:selected.has(entry.id)?"#0a1f30":entry.status==="erro"?"rgba(239,68,68,0.025)":!entry.tags_ok?"rgba(245,158,11,0.025)":"transparent"}}>
        <div style={{paddingTop:3}}>
          <div style={{width:13,height:13,borderRadius:3,
            border:`1px solid ${selected.has(entry.id)?"#0ea5e9":"#1e2d3d"}`,
            background:selected.has(entry.id)?"#0ea5e9":"transparent",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {selected.has(entry.id)&&<Icon name="check" size={9}/>}
          </div>
        </div>
        <div style={{paddingRight:12}}>
          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
            <span style={{
              color:entry.id>0?"#1e3a52":"#3d1a00",fontSize:9,
              fontFamily:"'JetBrains Mono',monospace",
              background:entry.id>0?"#050d17":"#1a0d00",
              border:`1px solid ${entry.id>0?"#0f2030":"#3d1a00"}`,
              borderRadius:3,padding:"0 4px",
              letterSpacing:"0.05em",userSelect:"all",cursor:"text"}}
              title={entry.id>0?"ID do DB3":"Pendente — sem ID no DB3 ainda"}>
              {entry.id>0?`#${entry.id}`:"pend"}
            </span>
            <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{entry.arquivo}</span>
          </div>
          <div style={{color:"#64748b",fontSize:11,fontFamily:"'JetBrains Mono',monospace",wordBreak:"break-all"}}>{entry.full_key}</div>
        </div>
        <div style={{paddingRight:14}}><TagText text={getText(entry,baseLang)}/></div>
        <div style={{paddingRight:14}}><TagText text={getText(entry,cmpLang)}/></div>
        <div style={{paddingTop:2,display:"flex",flexDirection:"column",gap:4}}>
          <Badge status={entry.status} modelo={entry.modelo} revisado={entry.status_revisao==="ok"}/>
          {!entry.tags_ok&&entry.status!=="erro"&&<span style={{color:"#f59e0b",fontSize:10,
            display:"flex",gap:2,alignItems:"center",fontFamily:"'JetBrains Mono',monospace"}}>
            <Icon name="tag" size={10}/> tags</span>}
        </div>
        <div style={{paddingTop:2,display:"flex",gap:5}}>
          <button onClick={e=>{
            e.stopPropagation();
            const ns=entry.status_revisao==="pendente"?"":"pendente";
            setEntries(prev=>prev.map(x=>x.id===entry.id?{...x,status_revisao:ns}:x));
            API.post("/api/revisao/save",{entradas:[{arquivo:entry.arquivo,full_key:entry.full_key,status_revisao:ns}]}).catch(()=>{});
          }} title={entry.status_revisao==="pendente"?"Remover marcação":"Marcar para revisão"}
          style={{
            background:entry.status_revisao==="pendente"?"rgba(249,115,22,0.15)":"rgba(71,85,105,0.12)",
            border:entry.status_revisao==="pendente"?"1px solid #c2410c":"1px solid #1e2d3d",
            borderRadius:5,padding:"4px 8px",
            color:entry.status_revisao==="pendente"?"#f97316":"#475569",
            fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",
            transition:"all 0.15s"}}>
            {entry.status_revisao==="pendente"?"⚑":"⚐"}
          </button>
          <button onClick={e=>{e.stopPropagation();onEdit(entry);}} style={{
            background:"rgba(71,85,105,0.15)",border:"1px solid #1e2d3d",
            borderRadius:5,padding:"4px 9px",color:"#64748b",fontSize:11,cursor:"pointer",
            display:"flex",gap:4,alignItems:"center",fontFamily:"'JetBrains Mono',monospace"}}>
            <Icon name="edit" size={10}/> ed
          </button>
        </div>
      </div>)}
    </div>
    <Pagination total={filtered.length} page={page} pageSize={pageSize} onPage={setPage} onPageSize={setPageSize}/>
  </div>;
}

// ══════════════════════════════════════════════════════════════
// EDITOR MODAL
// ══════════════════════════════════════════════════════════════
const LANG_LABELS={
  eng:"INGLÊS (ENG)",pt:"PT-BR (TRADUÇÃO)",cht:"CHINÊS TRADICIONAL (CHT)",
  kor:"COREANO (KOR)",rus:"RUSSO (RUS)",ukt:"UCRANIANO (UKR)",ptbrc:"PT-BRC (ANTERIOR)",
};
function EditorModal({entry,refLang,onClose,onSave,onRevisao,onPipeline,apiModelo,apiOpts=[]}){
  const [ptText,setPtText]=useState(entry?.pt||"");
  const [saved,setSaved]=useState(false);
  const [revisao,setRevisao]=useState(entry?.status_revisao||"");
  const [nota,setNota]=useState(entry?.nota_revisor||"");
  const [showNota,setShowNota]=useState(false);
  const [tagTraduzOk,setTagTraduzOk]=useState(entry?.tags_traduz_ok??null);
  const hasTraduzTags = temTagsTraduz(entry?.pt||"") || temTagsTraduz(entry?.eng||"");
  if(!entry) return null;

  const refText=entry[refLang]||null;
  const refLabel=LANG_LABELS[refLang]||refLang.toUpperCase();

  const isAdult=entry.status==="erro"&&/penis|vagina|rape|knot|doggy|whore/i.test(entry.eng||"");
  const ci=entry.status==="erro"
    ?{color:"#f87171",bg:"rgba(239,68,68,0.08)",border:"#7f1d1d",
      label:isAdult?"⚠  Filtro de conteúdo GPT — tradução manual necessária":"⚠  Timeout de conexão — reenvio para API resolve"}
    :!entry.tags_ok
    ?{color:"#fbbf24",bg:"rgba(245,158,11,0.08)",border:"#78350f",label:"⚠  Tags embaralhadas pelo GPT — reenvio individual (lote=1) resolve"}
    :{color:"#4ade80",bg:"rgba(34,197,94,0.07)",border:"#14532d",label:"✓  Tradução aprovada"};

  const handleSaveClick=()=>{
    // Se o texto foi editado, é automaticamente Correção Humana
    const textoMudou   = ptText !== (entry.pt||"");
    // Se texto mudou: marca como Correção Humana (modelo=manual)
    // mas PRESERVA status_revisao="pendente" se o revisor havia marcado para revisão
    // Revisão só sai via botão ⚑ explícito, nunca automaticamente
    const revisaoAtual  = entry.status_revisao||"";
    const revisaoFinal  = textoMudou
      ? (revisaoAtual === "pendente" ? "pendente" : revisaoAtual)
      : revisao;
    const modeloFinal  = textoMudou ? "manual" : (modeloLocal||null);
    if(textoMudou && revisaoAtual !== "pendente") setRevisao(revisaoAtual||"ok");

    onSave(entry.id, ptText);

    // Persiste revisao/nota/modelo se qualquer coisa mudou
    const revisaoMudou = revisaoFinal !== (entry.status_revisao||"");
    const notaMudou    = nota         !== (entry.nota_revisor||"");
    const modeloMudou  = modeloFinal  !== (entry.modelo||"");
    if(onRevisao && (textoMudou||revisaoMudou||notaMudou||modeloMudou)) {
      onRevisao(entry.id, revisaoFinal, nota, modeloFinal);
    }
    setSaved(true);
    setTimeout(()=>{setSaved(false);onClose();},700);
  };

  const [modeloLocal,setModeloLocal]=useState(
    entry?.status_revisao==="ok"?"manual":""
  );
  const cycleRevisao=()=>{
    const next = revisao===""?"pendente":revisao==="pendente"?"ok":"";
    setRevisao(next);
    if(next==="ok")       setModeloLocal("manual");
    else if(next==="")    setModeloLocal("");
  };

  const revColor = revisao==="pendente"?"#f97316":revisao==="ok"?"#c084fc":"#475569";
  const revLabel = revisao==="pendente"?"⚑ Para revisão":revisao==="ok"?"✎ Correção Humana":"⚐ Sem marcação";

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",
    zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"12px 8px"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#0c1520",border:"1px solid #1e2d3d",
      borderRadius:14,width:"100%",maxWidth:"min(780px, calc(100vw - 24px))",maxHeight:"92vh",
      display:"flex",flexDirection:"column",overflow:"hidden",
      boxShadow:"0 25px 60px rgba(0,0,0,0.6)"}}>
      {/* Header */}
      <div style={{padding:"16px 22px",borderBottom:"1px solid #1e2d3d",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
            <span style={{
              color:entry.id>0?"#1e3a52":"#3d1a00",fontSize:9,
              fontFamily:"'JetBrains Mono',monospace",
              background:entry.id>0?"#050d17":"#1a0d00",
              border:`1px solid ${entry.id>0?"#0f2030":"#3d1a00"}`,
              borderRadius:3,padding:"1px 5px",
              userSelect:"all",cursor:"text"}}
              title={entry.id>0?"ID do DB3":"Pendente — sem ID no DB3 ainda"}>
              {entry.id>0?`#${entry.id}`:"pend"}
            </span>
            <span style={{color:"#334155",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{entry.arquivo}</span>
          </div>
          <div style={{color:"#f1f5f9",fontWeight:700,fontSize:15,fontFamily:"'JetBrains Mono',monospace"}}>{entry.full_key}</div>
        </div>
        {/* Status revisão no header */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={cycleRevisao} title="Ciclar: Sem marcação → Para revisão → Correção Humana" style={{
            background:`${revColor}15`,border:`1px solid ${revColor}55`,
            borderRadius:6,padding:"5px 12px",color:revColor,
            fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",
            transition:"all 0.15s"}}>{revLabel}</button>
          <button onClick={onClose} style={{background:"rgba(71,85,105,0.15)",border:"1px solid #1e2d3d",
            borderRadius:7,padding:7,cursor:"pointer",color:"#64748b"}}><Icon name="close" size={14}/></button>
        </div>
      </div>
      <div style={{overflowY:"auto",padding:22,display:"flex",flexDirection:"column",gap:14}}>
        {revisao==="ok"&&<div style={{background:"rgba(192,132,252,0.08)",border:"1px solid #7c3aed55",borderRadius:8,
          padding:"9px 14px",color:"#c084fc",fontSize:12,fontFamily:"'JetBrains Mono',monospace",
          display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:14}}>✎</span> Correção Humana — tradução revisada manualmente
        </div>}
        <div style={{background:ci.bg,border:`1px solid ${ci.border}`,borderRadius:8,
          padding:"9px 14px",color:ci.color,fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>{ci.label}</div>
        {/* ENG */}
        <div>
          <div style={{color:"#334155",fontSize:10,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>INGLÊS (ENG)</div>
          <div style={{background:"#060c12",border:"1px solid #1e2d3d",borderRadius:7,padding:"11px 14px"}}><TagText text={entry.eng}/></div>
        </div>
        {/* Ref lang */}
        {refLang!=="eng"&&<div>
          <div style={{color:"#334155",fontSize:10,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>{refLabel}</div>
          <div style={{background:"#060c12",border:"1px solid #1e2d3d",borderRadius:7,padding:"11px 14px"}}>
            {refText?<TagText text={refText}/>:<span style={{color:"#334155",fontStyle:"italic",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>— sem dados para este idioma —</span>}
          </div>
        </div>}
        {/* PT-BR editável */}
        <div>
          <div style={{color:"#0ea5e9",fontSize:10,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>PORTUGUÊS BRASILEIRO ✏</div>
          <textarea value={ptText} onChange={e=>setPtText(e.target.value)}
            style={{width:"100%",minHeight:88,background:"#060c12",border:"1px solid #0ea5e9",
              borderRadius:7,padding:"11px 14px",color:"#e2e8f0",fontSize:13,
              fontFamily:"'JetBrains Mono',monospace",resize:"vertical",lineHeight:1.7}}/>
        </div>
        {/* Nota do revisor — expansível */}
        <div>
          <button onClick={()=>setShowNota(p=>!p)} style={{background:"none",border:"none",
            color:"#334155",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",
            display:"flex",gap:5,alignItems:"center",padding:0}}>
            {showNota?"▾":"▸"} Nota do revisor {nota&&<span style={{color:"#f97316",fontSize:10}}>●</span>}
          </button>
          {showNota&&<textarea value={nota} onChange={e=>setNota(e.target.value)}
            placeholder="Anote problemas, dúvidas, contexto..."
            style={{width:"100%",marginTop:6,minHeight:54,background:"#060c12",border:"1px solid #334155",
              borderRadius:7,padding:"9px 12px",color:"#94a3b8",fontSize:12,
              fontFamily:"'JetBrains Mono',monospace",resize:"vertical",lineHeight:1.6}}/>}
        </div>
      </div>
      {/* Footer */}
      <div style={{padding:"14px 22px",borderTop:"1px solid #1e2d3d",display:"flex",gap:9,justifyContent:"flex-end",alignItems:"center"}}>
        {/* Botão de aprovação de tags traduzíveis — só aparece quando há \board, \optB ou \optD */}
        {hasTraduzTags && <button
          onClick={async()=>{
            const next = tagTraduzOk===1 ? null : 1;
            setTagTraduzOk(next);
            try { await API.post("/api/tags-traduz/salvar",{arquivo:entry.arquivo,full_key:entry.full_key,tags_traduz_ok:next}); } catch(e){}
          }}
          title="Aprova o conteúdo dentro das tags traduzíveis (\board, \optB, \optD)"
          style={{background:tagTraduzOk===1?"rgba(34,211,238,0.18)":"rgba(34,211,238,0.07)",
            border:tagTraduzOk===1?"1px solid #0891b2":"1px solid #164e63",borderRadius:7,
            padding:"7px 15px",color:tagTraduzOk===1?"#22d3ee":"#0e7490",fontSize:12,
            cursor:"pointer",display:"flex",gap:5,alignItems:"center",transition:"all 0.15s"}}>
          {tagTraduzOk===1 ? "✓ Tags OK" : "◎ Aprovar Tags"}
        </button>}
        <button onClick={()=>{
            if(!onPipeline) return;
            const a=(apiOpts||[]).find(o=>o.val===apiModelo)||{provider:"gpt"};
            onPipeline("reenviar",{ids:String(entry.id),modelo:apiModelo,provider:a.provider,fonte_lang:refLang});
            onClose();
          }} disabled={!onPipeline}
          style={{background:"rgba(245,158,11,0.1)",border:"1px solid #92400e",borderRadius:7,
          padding:"7px 15px",color:"#fbbf24",fontSize:12,cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
          <Icon name="send" size={12}/> Reenviar API</button>
        <button onClick={()=>setPtText(entry.pt||"")} style={{background:"rgba(71,85,105,0.1)",
          border:"1px solid #1e2d3d",borderRadius:7,padding:"7px 15px",color:"#475569",
          fontSize:12,cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
          <Icon name="refresh" size={12}/> Restaurar</button>
        <button onClick={handleSaveClick} disabled={saved}
          style={{background:saved?"rgba(34,197,94,0.25)":"rgba(34,197,94,0.15)",
            border:`1px solid ${saved?"#22c55e":"#166534"}`,borderRadius:7,
            padding:"7px 20px",color:"#22c55e",fontSize:12,cursor:saved?"default":"pointer",fontWeight:600,
            display:"flex",gap:5,alignItems:"center",transition:"all 0.2s"}}>
          <Icon name="check" size={12}/> {saved?"Salvo!":"Salvar"}</button>
      </div>
    </div>
  </div>;
}


// ══════════════════════════════════════════════════════════════
// PROBLEMAS
// ══════════════════════════════════════════════════════════════
function ProblemsScreen({onEdit,entries,langs=[],onPipeline,apiModelo,apiOpts=[],srvOnline,pipeRunning,setEntries,setDbStats,setDbStatus,setLangsDisponiveis,tagsSaida,setTagsSaida}){
  const [tab,setTab]=useState("erros");
  const [page,setPage]=useState(1);
  const [pageSize,setPageSize]=useState(25);
  const [refLangP,setRefLangP]=useState("cht");
  const [selected,setSelected]=useState(new Set()); // ids selecionados para reenvio bulk
  const [runMsg,setRunMsg]=useState(null); // {ok,msg}
  const [filtroSaida,setFiltroSaida]=useState("");  // filtro da tab tags_saida
  // Recarrega entries quando pipeline termina (IDs mudam de negativo→positivo após tradução)
  const prevRunning=React.useRef(pipeRunning);
  useEffect(()=>{
    if(prevRunning.current && !pipeRunning && srvOnline){
      // Pipeline acabou — força reload para pegar IDs atualizados
      fetch("/api/entries").then(r=>r.json()).then(dat=>{
        if(dat?.entries&&setEntries) setEntries(dat.entries);
        if(dat?.stats&&setDbStats) setDbStats(dat.stats);
      }).catch(()=>{});
    }
    prevRunning.current=pipeRunning;
  },[pipeRunning]);

  const erros=useMemo(()=>entries.filter(e=>e.status==="erro"),[entries]);
  const tagsBad=useMemo(()=>entries.filter(e=>e.status!=="erro"&&!e.tags_ok),[entries]);
  const tagsTraduz=useMemo(()=>entries.filter(e=>
    temTagsTraduz(e.pt||"") && !(e.tags_traduz_ok===1) &&
    (e.status==="traduzido"||e.status==="aproveitado")
  ),[entries]);
  const list=tab==="erros"?erros:tab==="tags"?tagsBad:tab==="tags_traduz"?tagsTraduz:[];
  const pageEntries=list.slice((page-1)*pageSize,page*pageSize);
  // Estado para salvar tags_traduz da aba
  const [savingTagTraduz,setSavingTagTraduz]=useState({});

  // Dados da aba Tags PT-BR (Saída)
  const saidaEstado   = tagsSaida?.estado   || "idle";
  const saidaResult   = tagsSaida?.resultado || null;
  const saidaQtd      = saidaResult?.quebradas || 0;
  const filtradosSaida = useMemo(()=>{
    const ents = saidaResult?.entradas || [];
    if(!filtroSaida.trim()) return ents;
    const q = filtroSaida.toLowerCase();
    return ents.filter(e=>
      e.arquivo.toLowerCase().includes(q) ||
      e.full_key.toLowerCase().includes(q) ||
      (e.faltando||[]).join(" ").toLowerCase().includes(q) ||
      (e.sobrando||[]).join(" ").toLowerCase().includes(q)
    );
  },[saidaResult, filtroSaida]);

  const verificarSaida = async () => {
    if(!srvOnline) return;
    setTagsSaida({estado:"carregando", resultado:null});
    try {
      const r = await API.get("/api/verificar-tags-saida");
      setTagsSaida({estado: r.erro ? "erro" : "ok", resultado: r});
    } catch(e) {
      setTagsSaida({estado:"erro", resultado:{erro: String(e)}});
    }
  };

  const isRunning=!!pipeRunning;

  // Reenviar via SSE — aceita array de ids ou undefined (todos da lista atual)
  const runReenviar=async(ids)=>{
    if(!srvOnline||isRunning) return;
    const a=(apiOpts||[]).find(o=>o.val===apiModelo)||{provider:"gpt"};
    const opts={modelo:apiModelo,provider:a.provider,fonte_lang:refLangP};
    if(ids&&ids.length>0) opts.ids=ids.join(",");
    setRunMsg(null);
    const r=await onPipeline("reenviar",opts);
    setRunMsg({ok:r?.ok,msg:r?.ok?"Reenvio concluído":"Reenvio finalizado com erros"});
    setSelected(new Set());
    // handlePipeline já recarrega entries via RELOAD_STEPS quando SSE termina
  };
  const toggleSel=(id)=>setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const selAll=()=>setSelected(new Set(pageEntries.map(e=>e.id)));
  const clrSel=()=>setSelected(new Set());
  const LANG_LABELS_P={"eng":"ENG","cht":"CHT","kor":"KOR","rus":"RUS","ukt":"UKR","ptbrc":"PT-BRC"};
  const getRef=(e)=>{
    const l=refLangP;
    if(l==="eng") return {text:e.eng, label:"ENG"};
    if(l==="cht") return {text:e.cht, label:"CHT"};
    if(l==="kor") return {text:e.kor, label:"KOR"};
    if(l==="rus") return {text:e.rus, label:"RUS"};
    if(l==="ukt") return {text:e.ukt, label:"UKR"};
    if(l==="ptbrc") return {text:e.ptbrc, label:"PT-BRC"};
    return {text:e.eng, label:"ENG"};
  };
  // langs disponíveis para referência (excluindo pt que é o alvo)
  const refLangsP=useMemo(()=>langs.filter(l=>l!=="pt").length>0
    ? langs.filter(l=>l!=="pt")
    : ["eng","cht"],[langs]);
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{padding:"14px 20px 0",borderBottom:"1px solid #1e2d3d",background:"#090e14",display:"flex",alignItems:"flex-end",gap:0}}>
      {[{id:"erros",label:"Erros",count:erros.length,color:"#ef4444"},
        {id:"tags",label:"Tags alteradas",count:tagsBad.length,color:"#f59e0b"},
        {id:"tags_traduz",label:"Tags traduzíveis",
          count:entries.filter(e=>temTagsTraduz(e.pt||"")&&!(e.tags_traduz_ok===1)).length,
          color:"#22d3ee"},
        {id:"tags_saida",label:"Tags PT-BR (Saída)",count:saidaQtd,color:"#fb923c",
          badge: saidaEstado==="idle"?"?": saidaEstado==="carregando"?"⏳": saidaQtd>0?saidaQtd:"✓"}].map(t=>
        <button key={t.id} onClick={()=>{setTab(t.id);setPage(1);}} style={{
          padding:"9px 18px",background:"transparent",cursor:"pointer",border:"none",
          borderBottom:tab===t.id?`2px solid ${t.color}`:"2px solid transparent",
          color:tab===t.id?t.color:"#475569",fontSize:13,
          fontFamily:"'JetBrains Mono',monospace",marginBottom:-1}}>
          {t.label}<span style={{marginLeft:8,background:`${t.color}22`,border:`1px solid ${t.color}44`,
            borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:700}}>{t.badge!==undefined?t.badge:t.count}</span>
        </button>)}
      <div style={{flex:1}}/>
      <div style={{paddingBottom:10,display:"flex",gap:8,alignItems:"center"}}>
        {/* Seletor de idioma referência */}
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>Ref</span>
          {refLangsP.map(l=>{
            const act=refLangP===l;
            const colors={"eng":"#94a3b8","cht":"#f97316","kor":"#38bdf8","rus":"#ef4444","ukt":"#a78bfa","ptbrc":"#22c55e"};
            const col=colors[l]||"#64748b";
            return <button key={l} onClick={()=>setRefLangP(l)} style={{
              padding:"3px 8px",borderRadius:4,fontSize:10,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace",fontWeight:act?700:400,
              background:act?col+"22":"transparent",
              border:act?`1px solid ${col}55`:"1px solid #1e2d3d",
              color:act?col:"#475569",transition:"all 0.1s"}}>
              {LANG_LABELS_P[l]||l.toUpperCase()}
            </button>;
          })}
        </div>
        <div style={{width:1,height:16,background:"#1e2d3d"}}/>
        {/* Bulk action bar */}
        {selected.size>0&&<div style={{display:"flex",alignItems:"center",gap:7,
          background:"rgba(14,165,233,0.08)",border:"1px solid #0c4a6e",borderRadius:6,padding:"4px 10px"}}>
          <span style={{color:"#38bdf8",fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
            {selected.size} sel.
          </span>
          <button onClick={()=>runReenviar([...selected])} disabled={isRunning}
            style={{background:"rgba(34,197,94,0.1)",border:"1px solid #166534",borderRadius:5,
              padding:"3px 10px",color:isRunning?"#334155":"#22c55e",fontSize:11,cursor:isRunning?"not-allowed":"pointer",
              fontFamily:"'JetBrains Mono',monospace",display:"flex",gap:4,alignItems:"center"}}>
            <Icon name="send" size={10}/> Reenviar sel.
          </button>
          <button onClick={clrSel} style={{background:"transparent",border:"none",color:"#475569",
            fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>✕</button>
        </div>}
        <button onClick={()=>runReenviar(list.map(e=>e.id))} disabled={isRunning||!srvOnline||list.length===0}
          style={{background:isRunning?"rgba(71,85,105,0.05)":"rgba(245,158,11,0.1)",
            border:isRunning?"1px solid #1e2d3d":"1px solid #78350f",borderRadius:6,
            padding:"5px 13px",color:isRunning?"#334155":"#fbbf24",fontSize:11,
            cursor:isRunning||!srvOnline?"not-allowed":"pointer",display:"flex",gap:5,
            alignItems:"center",fontFamily:"'JetBrains Mono',monospace",opacity:isRunning?0.5:1}}>
          {isRunning
            ?<span style={{display:"inline-block",width:10,height:10,border:"2px solid #fbbf24",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
            :<Icon name="send" size={11}/>}
          Reenviar todos ({list.length})
        </button>
        {/* Selecionar página */}
        <button onClick={selected.size>0?clrSel:selAll}
          style={{background:"rgba(71,85,105,0.08)",border:"1px solid #1e2d3d",borderRadius:6,
            padding:"5px 10px",color:"#475569",fontSize:11,cursor:"pointer",
            fontFamily:"'JetBrains Mono',monospace"}}>
          {selected.size>0?"Limpar sel.":"Sel. página"}
        </button>
      </div>
    </div>
    <div style={{padding:"9px 20px",borderBottom:"1px solid #0a1520",background:"#090e14",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{color:tab==="erros"?"#fca5a5":tab==="tags_saida"?"#fb923c":tab==="tags_traduz"?"#22d3ee":"#fcd34d",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
        {tab==="erros"
          ?`→ ${erros.length} entradas sem tradução — use DeepSeek ou Editar manual para filtros GPT.`
          :tab==="tags_saida"
          ?"→ Tags da pasta PT-BR\\ (saída) comparadas com ENG. Diferenças podem causar bugs visuais no jogo."
          :tab==="tags_traduz"
          ?"→ Entradas com \\board[...], \\optB[...] ou \\optD[...] traduzíveis. Abra o editor e clique ◎ Aprovar Tags."
          :"→ GPT embaralhou tags entre entradas do mesmo lote. Reenvio individual resolve."}
      </span>
      {/* Feedback resultado */}
      {runMsg&&<span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",
        color:runMsg.ok?"#4ade80":"#f87171",display:"flex",alignItems:"center",gap:5}}>
        {runMsg.ok?"✓":"✗"} {runMsg.msg}
        <button onClick={()=>setRunMsg(null)} style={{background:"transparent",border:"none",color:"#334155",cursor:"pointer",fontSize:12}}>✕</button>
      </span>}
      {/* Indicador execução */}
      {isRunning&&<span style={{color:"#fbbf24",fontSize:11,fontFamily:"'JetBrains Mono',monospace",display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:7,height:7,borderRadius:"50%",background:"#fbbf24",animation:"pulse 1s infinite",display:"block"}}/>
        Enviando para API...
      </span>}
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      {/* ── Aba Tags PT-BR (Saída) ── */}
      {tab==="tags_saida" && <div style={{padding:"20px"}}>
        {/* Estado idle — ainda não verificou */}
        {saidaEstado==="idle" && <div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{color:"#475569",fontSize:14,marginBottom:16}}>
            🏷 Nenhuma verificação realizada ainda
          </div>
          <div style={{color:"#334155",fontSize:12,fontFamily:"'JetBrains Mono',monospace",marginBottom:20}}>
            Compara as tags dos arquivos PT-BR\ (saída do gerador) com o ENG original do DB2.<br/>
            A pasta PT-BR\ tem confiança total no extrator — este diagnóstico torna o ponto cego visível.
          </div>
          <button onClick={verificarSaida}
            style={{background:"rgba(251,146,60,0.12)",border:"1px solid #c2410c",borderRadius:8,
              padding:"10px 28px",color:"#fb923c",fontSize:13,cursor:"pointer",
              fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
            🔍 Verificar Tags PT-BR agora
          </button>
        </div>}

        {/* Estado carregando */}
        {saidaEstado==="carregando" && <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{width:32,height:32,border:"3px solid #1e2d3d",borderTopColor:"#fb923c",
            borderRadius:"50%",animation:"spin 0.7s linear infinite",margin:"0 auto 14px"}}/>
          <div style={{color:"#475569",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}>Verificando arquivos PT-BR\...</div>
        </div>}

        {/* Estado erro */}
        {saidaEstado==="erro" && saidaResult?.erro && <div style={{
          background:"#1c0a00",border:"1px solid #7c2d12",borderRadius:8,padding:"16px 20px",marginBottom:16}}>
          <div style={{color:"#f87171",fontSize:13,fontFamily:"'JetBrains Mono',monospace",marginBottom:10}}>{saidaResult.erro}</div>
          <button onClick={verificarSaida}
            style={{background:"rgba(251,146,60,0.1)",border:"1px solid #c2410c",borderRadius:6,
              padding:"6px 16px",color:"#fb923c",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
            Tentar novamente
          </button>
        </div>}

        {/* Estado ok — mostra resultados */}
        {saidaEstado==="ok" && saidaResult && <>
          {/* Resumo */}
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            {[
              {l:"Verificados", v:saidaResult.total,    c:"#94a3b8"},
              {l:"OK",          v:saidaResult.ok,       c:"#4ade80"},
              {l:"Quebradas",   v:saidaResult.quebradas,c:saidaResult.quebradas>0?"#f59e0b":"#4ade80"},
            ].map(s=><div key={s.l} style={{background:"#0b1219",border:"1px solid #1e2d3d",
              borderRadius:7,padding:"8px 14px",fontFamily:"'JetBrains Mono',monospace"}}>
              <div style={{color:"#334155",fontSize:9,letterSpacing:"0.1em",marginBottom:2}}>{s.l.toUpperCase()}</div>
              <div style={{color:s.c,fontSize:18,fontWeight:700}}>{s.v}</div>
            </div>)}
            <div style={{flex:1}}/>
            <button onClick={verificarSaida}
              style={{background:"rgba(71,85,105,0.1)",border:"1px solid #1e2d3d",borderRadius:6,
                padding:"6px 14px",color:"#64748b",fontSize:11,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
              🔍 Reverificar
            </button>
          </div>

          {/* Tudo ok */}
          {saidaResult.quebradas===0 && <div style={{background:"#0d2d1a",border:"1px solid #166534",
            borderRadius:8,padding:"20px",textAlign:"center",color:"#4ade80",fontSize:14}}>
            ✓ Nenhuma tag quebrada — pasta PT-BR\ está íntegra!
          </div>}

          {/* Lista de quebradas */}
          {saidaResult.quebradas>0 && <>
            <input value={filtroSaida} onChange={e=>setFiltroSaida(e.target.value)}
              placeholder="Filtrar por arquivo, chave ou tag..."
              style={{width:"100%",background:"#060c12",border:"1px solid #1e2d3d",borderRadius:7,
                padding:"8px 12px",color:"#e2e8f0",fontSize:12,
                fontFamily:"'JetBrains Mono',monospace",marginBottom:12}}/>
            {filtradosSaida.length===0
              ? <div style={{textAlign:"center",color:"#475569",padding:"20px"}}>Nenhum resultado para "{filtroSaida}"</div>
              : filtradosSaida.map((e,i)=><div key={i} style={{
                  background:"#0b1219",border:"1px solid #78350f55",borderRadius:8,
                  padding:"14px 16px",marginBottom:8}}>
                  {/* Arquivo + chave */}
                  <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:10,flexWrap:"wrap"}}>
                    <span style={{color:"#64748b",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>{e.arquivo}</span>
                    <span style={{color:"#334155",fontSize:10}}>›</span>
                    <span style={{color:"#94a3b8",fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{e.full_key}</span>
                  </div>
                  {/* Tags lado a lado */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div style={{background:"#060c12",borderRadius:6,padding:"8px 10px",border:"1px solid #1e2d3d"}}>
                      <div style={{color:"#475569",fontSize:9,fontFamily:"'JetBrains Mono',monospace",
                        letterSpacing:"0.1em",marginBottom:5}}>ENG — ESPERADO</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {e.tags_eng.length===0
                          ? <span style={{color:"#334155",fontSize:11,fontStyle:"italic"}}>sem tags</span>
                          : e.tags_eng.map((t,j)=><span key={j} style={{
                              background:e.faltando?.includes(t)?"rgba(239,68,68,0.15)":"rgba(245,158,11,0.12)",
                              border:`1px solid ${e.faltando?.includes(t)?"#7f1d1d":"#78350f55"}`,
                              color:e.faltando?.includes(t)?"#f87171":"#f59e0b",
                              borderRadius:4,padding:"2px 6px",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{t}</span>)}
                      </div>
                    </div>
                    <div style={{background:"#060c12",borderRadius:6,padding:"8px 10px",border:"1px solid #1e2d3d"}}>
                      <div style={{color:"#475569",fontSize:9,fontFamily:"'JetBrains Mono',monospace",
                        letterSpacing:"0.1em",marginBottom:5}}>PT-BR — ENCONTRADO</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {e.tags_pt.length===0
                          ? <span style={{color:"#334155",fontSize:11,fontStyle:"italic"}}>sem tags</span>
                          : e.tags_pt.map((t,j)=><span key={j} style={{
                              background:e.sobrando?.includes(t)?"rgba(239,68,68,0.15)":"rgba(34,197,94,0.1)",
                              border:`1px solid ${e.sobrando?.includes(t)?"#7f1d1d":"#14532d55"}`,
                              color:e.sobrando?.includes(t)?"#f87171":"#22c55e",
                              borderRadius:4,padding:"2px 6px",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{t}</span>)}
                      </div>
                    </div>
                  </div>
                  {/* Diagnóstico rápido */}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {e.faltando?.length>0&&<span style={{background:"rgba(239,68,68,0.08)",
                      border:"1px solid #7f1d1d",borderRadius:4,padding:"3px 10px",
                      color:"#f87171",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                      ← faltando: {e.faltando.join("  ")}
                    </span>}
                    {e.sobrando?.length>0&&<span style={{background:"rgba(251,191,36,0.08)",
                      border:"1px solid #78350f",borderRadius:4,padding:"3px 10px",
                      color:"#fbbf24",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                      + sobrando: {e.sobrando.join("  ")}
                    </span>}
                  </div>
                </div>)}
          </>}
        </>}
      </div>}

      {/* ── Abas Erros e Tags alteradas — lista original ── */}
      {/* ── Aba Tags Traduzíveis ── */}
      {tab==="tags_traduz" && <div style={{flex:1,overflowY:"auto"}}>
        {tagsTraduz.length===0
          ? <div style={{padding:"40px",textAlign:"center",color:"#334155",fontFamily:"'JetBrains Mono',monospace",fontSize:13}}>
              ✓ Nenhuma tag traduzível pendente de aprovação.
            </div>
          : pageEntries.map(entry=>{
              const aprovado = entry.tags_traduz_ok===1;
              const saving   = savingTagTraduz[entry.id];
              const aprovar  = async()=>{
                const next = aprovado ? null : 1;
                setSavingTagTraduz(p=>({...p,[entry.id]:true}));
                try {
                  await API.post("/api/tags-traduz/salvar",{arquivo:entry.arquivo,full_key:entry.full_key,tags_traduz_ok:next});
                  if(setEntries){
                    const fresh=await API.get("/api/entries");
                    if(fresh.entries) setEntries(fresh.entries);
                  }
                } catch(e){}
                setSavingTagTraduz(p=>({...p,[entry.id]:false}));
              };
              return <div key={entry.id} style={{padding:"13px 20px",borderBottom:"1px solid #0a1520",
                display:"grid",gridTemplateColumns:"1fr 1fr 120px",gap:12,alignItems:"start",
                background:aprovado?"rgba(34,211,238,0.03)":"transparent"}}>
                <div>
                  <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:6}}>
                    <Badge status={entry.status} modelo={entry.modelo} revisado={entry.status_revisao==="ok"}/>
                    <TagTraduzBadge val={entry.tags_traduz_ok??null}/>
                    <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{entry.arquivo}</span>
                  </div>
                  <div style={{color:"#64748b",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>{entry.full_key}</div>
                  <div style={{background:"#060c12",borderRadius:6,padding:"8px 11px",border:"1px solid #1e2d3d"}}>
                    <div style={{color:"#334155",fontSize:9,fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>ENG</div>
                    <TagText text={entry.eng}/>
                  </div>
                </div>
                <div>
                  <div style={{background:"#060c12",borderRadius:6,padding:"8px 11px",
                    border:`1px solid ${aprovado?"#0891b255":"#164e6355"}`,marginTop:24}}>
                    <div style={{color:"#334155",fontSize:9,fontFamily:"'JetBrains Mono',monospace",marginBottom:4}}>PT-BR</div>
                    <TagText text={entry.pt}/>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:7,paddingTop:24}}>
                  <button onClick={aprovar} disabled={saving}
                    style={{background:aprovado?"rgba(34,211,238,0.18)":"rgba(34,211,238,0.08)",
                      border:aprovado?"1px solid #0891b2":"1px solid #164e63",borderRadius:6,
                      padding:"8px 0",color:aprovado?"#22d3ee":"#0e7490",fontSize:11,
                      cursor:saving?"wait":"pointer",display:"flex",gap:5,alignItems:"center",
                      justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>
                    {saving
                      ? <span style={{display:"inline-block",width:10,height:10,border:"2px solid #22d3ee",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
                      : aprovado ? "✓ Tags OK" : "◎ Aprovar Tags"}
                  </button>
                  <button onClick={()=>onEdit(entry)}
                    style={{background:"rgba(14,165,233,0.07)",border:"1px solid #0c4a6e",
