                      borderRadius:6,padding:"7px 0",color:"#38bdf8",fontSize:11,cursor:"pointer",
                      display:"flex",gap:5,alignItems:"center",justifyContent:"center",
                      fontFamily:"'JetBrains Mono',monospace"}}>
                    <Icon name="edit" size={11}/> Editar
                  </button>
                </div>
              </div>;
            })}
      </div>}

      {tab!=="tags_saida"&&tab!=="tags_traduz" && pageEntries.map(entry=><div key={entry.id} style={{padding:"15px 20px",borderBottom:"1px solid #0a1520",
        display:"grid",gridTemplateColumns:"1fr 1fr 110px",gap:14,alignItems:"start",background:selected.has(entry.id)?"rgba(14,165,233,0.04)":"transparent"}}>
        <div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:7}}>
            <Badge status={entry.status} modelo={entry.modelo} revisado={entry.status_revisao==="ok"}/>
                    {temTagsTraduz(entry.pt||"")&&<TagTraduzBadge val={entry.tags_traduz_ok??null}/>}
            <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{entry.arquivo}</span>
          </div>
          <div style={{color:"#64748b",fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>{entry.full_key}</div>
          {(()=>{
            const {text,label}=getRef(entry);
            // fallback: se o idioma selecionado estiver vazio, tenta eng → cht
            const fallback = !text ? (entry.eng?{text:entry.eng,label:"ENG↩"}:entry.cht?{text:entry.cht,label:"CHT↩"}:null) : null;
            const show = text ? {text,label} : fallback;
            const isFallback = !text && show;
            return <div style={{background:"#060c12",borderRadius:7,padding:"8px 12px",border:"1px solid #1e2d3d"}}>
              {show
                ? <><div style={{color:isFallback?"#f97316":"#334155",fontSize:9,
                    fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",marginBottom:4}}>
                    {show.label}{isFallback&&" (sem "+label+")"}
                  </div><TagText text={show.text}/></>
                : <span style={{color:"#4b5563",fontStyle:"italic",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>— sem texto de referência —</span>
              }
            </div>;
          })()}
        </div>
        <div>
          <div style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace",marginBottom:7}}>
            {entry.status==="erro"?"PT-BR (vazio)":"PT-BR (problema)"}</div>
          <div style={{background:"#060c12",borderRadius:7,padding:"8px 12px",
            border:`1px solid ${entry.status==="erro"?"#7f1d1d":"#78350f"}`}}>
            {entry.pt?<TagText text={entry.pt}/>:<span style={{color:"#4b5563",fontStyle:"italic",fontSize:12}}>— filtro GPT bloqueou —</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7,paddingTop:28}}>
          {/* Checkbox seleção */}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",paddingBottom:4,
            borderBottom:"1px solid #0f1923",marginBottom:2}}>
            <input type="checkbox" checked={selected.has(entry.id)}
              onChange={()=>toggleSel(entry.id)}
              style={{accentColor:"#0ea5e9",width:13,height:13,cursor:"pointer"}}/>
            <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>sel.</span>
          </label>
          <button onClick={()=>onEdit(entry)} style={{background:"rgba(14,165,233,0.08)",border:"1px solid #0c4a6e",
            borderRadius:6,padding:"7px 0",color:"#38bdf8",fontSize:11,cursor:"pointer",
            display:"flex",gap:5,alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace"}}>
            <Icon name="edit" size={11}/> Editar</button>
          <button onClick={()=>runReenviar([entry.id])} disabled={isRunning||!srvOnline}
            style={{background:isRunning?"rgba(71,85,105,0.05)":"rgba(245,158,11,0.08)",
              border:isRunning?"1px solid #1e2d3d":"1px solid #78350f",borderRadius:6,
              padding:"7px 0",color:isRunning?"#334155":"#fbbf24",fontSize:11,
              cursor:isRunning||!srvOnline?"not-allowed":"pointer",display:"flex",gap:5,
              alignItems:"center",justifyContent:"center",fontFamily:"'JetBrains Mono',monospace",
              opacity:isRunning?0.5:1}}>
            <Icon name="send" size={11}/> Reenviar
          </button>
        </div>
      </div>)}
    </div>
    {tab!=="tags_saida"&&tab!=="tags_traduz"&&<Pagination total={list.length} page={page} pageSize={pageSize} onPage={setPage} onPageSize={setPageSize}/>}
    {tab==="tags_traduz"&&<Pagination total={tagsTraduz.length} page={page} pageSize={pageSize} onPage={setPage} onPageSize={setPageSize}/>}
  </div>;
}

// ══════════════════════════════════════════════════════════════
// EXPORTAR
// ══════════════════════════════════════════════════════════════
function ExportScreen({entries, srvOnline, onPipeline, pipeRunning}){
  const [log,setLog]=useState([]);
  const [running,setRunning]=useState(null); // 'all'|'dry'|'rel'|arquivo
  const [lastResult,setLastResult]=useState(null); // {ok,step}
  const logRef=React.useRef(null);

  const arquivos=useMemo(()=>[...new Set(entries.map(e=>e.arquivo))].sort(),[entries]);

  // Stats por arquivo
  const statsArq=useMemo(()=>{
    const m={};
    arquivos.forEach(arq=>{
      const es=entries.filter(e=>e.arquivo===arq);
      const ok=es.filter(e=>e.status==="traduzido"||e.status==="aproveitado").length;
      const err=es.filter(e=>e.status==="erro").length;
      const pend=es.filter(e=>e.status==="pendente").length;
      m[arq]={total:es.length,ok,err,pend};
    });
    return m;
  },[entries,arquivos]);

  // Stats globais
  const totalOk=useMemo(()=>Object.values(statsArq).reduce((a,s)=>a+s.ok,0),[statsArq]);
  const totalErr=useMemo(()=>Object.values(statsArq).reduce((a,s)=>a+s.err,0),[statsArq]);
  const totalPend=useMemo(()=>Object.values(statsArq).reduce((a,s)=>a+s.pend,0),[statsArq]);
  const totalEntradas=useMemo(()=>Object.values(statsArq).reduce((a,s)=>a+s.total,0),[statsArq]);
  const cobertura=totalEntradas>0?Math.round(totalOk*100/totalEntradas):0;

  // Auto-scroll log
  React.useEffect(()=>{
    if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight;
  },[log]);

  const runStep=async(step,opts={},label)=>{
    if(!srvOnline){setLog(["[ERRO] Servidor offline — execute: python servidor.py"]);return;}
    if(running) return;
    setRunning(label);
    setLog([`► ${label}...`]);
    setLastResult(null);
    const params=new URLSearchParams(opts);
    const es=new EventSource(`/api/pipeline/${step}/stream?${params}`);
    es.onmessage=(ev)=>{
      try{
        const d=JSON.parse(ev.data);
        if(d.ping) return;
        if(d.line) setLog(prev=>[...prev,d.line].slice(-300));
        if(d.done){
          es.close();
          setRunning(null);
          setLastResult({ok:d.returncode===0,step});
          setLog(prev=>[...prev, d.returncode===0?"✓ Concluído com sucesso.":"✗ Finalizado com erros."]);
        }
      }catch(e){}
    };
    es.onerror=()=>{
      es.close();
      setRunning(null);
      setLog(prev=>[...prev,"[ERR] SSE desconectado."]);
    };
  };

  const busy=!!running;
  const MF="'JetBrains Mono',monospace";

  // Cor do botão por tipo
  const btnStyle=(variant,disabled)=>({
    background: disabled?"rgba(255,255,255,0.03)":
      variant==="primary"?"rgba(34,197,94,0.12)":
      variant==="warn"?"rgba(251,191,36,0.1)":
      "rgba(14,165,233,0.08)",
    border: disabled?"1px solid #1e2d3d":
      variant==="primary"?"1px solid #166534":
      variant==="warn"?"1px solid #92400e":
      "1px solid #0c4a6e",
    color: disabled?"#334155":
      variant==="primary"?"#22c55e":
      variant==="warn"?"#fbbf24":
      "#38bdf8",
    borderRadius:6,padding:"7px 16px",fontSize:12,cursor:disabled?"not-allowed":"pointer",
    fontFamily:MF,fontWeight:600,opacity:disabled?0.5:1,transition:"opacity 0.15s",
    display:"flex",alignItems:"center",gap:6,
  });

  return <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
    {/* ── Coluna esquerda: controles + lista de arquivos ── */}
    <div style={{width:320,borderRight:"1px solid #1e2d3d",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
      {/* Header */}
      <div style={{padding:"20px 20px 14px",borderBottom:"1px solid #1e2d3d"}}>
        <div style={{color:"#475569",fontSize:10,letterSpacing:"0.18em",fontFamily:MF,marginBottom:4}}>GERADOR DE ARQUIVOS</div>
        <div style={{color:"#f1f5f9",fontSize:17,fontWeight:700,marginBottom:12}}>Exportar PT-BR</div>
        {/* Stats resumidas */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:14}}>
          {[
            {label:"Traduzido",val:totalOk,color:"#22c55e"},
            {label:"Pendente",val:totalPend,color:"#64748b"},
            {label:"Erro",val:totalErr,color:totalErr>0?"#f87171":"#334155"},
          ].map(s=><div key={s.label} style={{background:"#0a1018",border:"1px solid #1e2d3d",borderRadius:6,padding:"7px 10px",textAlign:"center"}}>
            <div style={{color:s.color,fontSize:16,fontWeight:700,fontFamily:MF}}>{s.val}</div>
            <div style={{color:"#334155",fontSize:10,fontFamily:MF,marginTop:2}}>{s.label}</div>
          </div>)}
        </div>
        {/* Barra de cobertura */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{color:"#475569",fontSize:11,fontFamily:MF}}>Cobertura PT-BR</span>
            <span style={{color:cobertura>80?"#22c55e":cobertura>40?"#fbbf24":"#f87171",fontSize:11,fontFamily:MF,fontWeight:700}}>{cobertura}%</span>
          </div>
          <div style={{height:4,background:"#0f1923",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${cobertura}%`,background:cobertura>80?"#22c55e":cobertura>40?"#fbbf24":"#ef4444",borderRadius:2,transition:"width 0.3s"}}/>
          </div>
        </div>
        {/* Botões principais */}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <button style={btnStyle("primary",busy)}
            onClick={()=>!busy&&runStep("gerador",{},"Gerar todos")}>
            {running==="Gerar todos"?<span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>:<Icon name="export" size={13}/>}
            Gerar todos ({arquivos.length} arquivos)
          </button>
          <div style={{display:"flex",gap:6}}>
            <button style={{...btnStyle("sky",busy),flex:1}}
              onClick={()=>!busy&&runStep("gerador_dry",{},"Dry-run")}>
              Simular (dry-run)
            </button>
            <button style={{...btnStyle("sky",busy),flex:1}}
              onClick={()=>!busy&&runStep("gerador_rel",{},"Relatório")}>
              Ver relatório
            </button>
          </div>
        </div>
        {/* Resultado da última execução */}
        {lastResult&&<div style={{marginTop:10,padding:"6px 10px",borderRadius:6,
          background:lastResult.ok?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",
          border:`1px solid ${lastResult.ok?"#166534":"#7f1d1d"}`,
          color:lastResult.ok?"#4ade80":"#f87171",fontSize:11,fontFamily:MF}}>
          {lastResult.ok?"✓ Arquivos gerados com sucesso":"✗ Finalizado com erros — veja o log"}
        </div>}
      </div>

      {/* Lista de arquivos */}
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
        <div style={{color:"#334155",fontSize:10,letterSpacing:"0.15em",fontFamily:MF,padding:"4px 8px",marginBottom:6}}>
          ARQUIVOS ({arquivos.length})
        </div>
        {arquivos.map(arq=>{
          const s=statsArq[arq]||{total:0,ok:0,err:0,pend:0};
          const pct=s.total>0?Math.round(s.ok*100/s.total):0;
          const isRunningThis=running===arq;
          return <div key={arq} style={{background:"#0a1018",border:"1px solid #1e2d3d",
            borderRadius:6,padding:"8px 10px",marginBottom:4}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                {s.err>0&&<span style={{width:5,height:5,borderRadius:"50%",background:"#ef4444",flexShrink:0,display:"block"}}/>}
                <span style={{color:"#94a3b8",fontSize:11,fontFamily:MF,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                  title={arq}>{arq}</span>
              </div>
              <button
                onClick={()=>!busy&&runStep("gerador",{arquivo:arq},arq)}
                style={{...btnStyle("sky",busy),padding:"3px 10px",fontSize:10,flexShrink:0}}>
                {isRunningThis?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>:"Gerar"}
              </button>
            </div>
            {/* Mini barra por arquivo */}
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{flex:1,height:3,background:"#0f1923",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,
                  background:pct===100?"#22c55e":pct>40?"#0ea5e9":"#475569",borderRadius:2}}/>
              </div>
              <span style={{color:"#334155",fontSize:10,fontFamily:MF,flexShrink:0,minWidth:28,textAlign:"right"}}>{pct}%</span>
              {s.err>0&&<span style={{color:"#f87171",fontSize:10,fontFamily:MF,flexShrink:0}}>{s.err}✗</span>}
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* ── Coluna direita: log ao vivo ── */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 18px",borderBottom:"1px solid #1e2d3d",background:"#090e14",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {running&&<span style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",
            animation:"pulse 1s infinite",display:"block"}}/>}
          <span style={{color:"#475569",fontSize:11,fontFamily:MF,letterSpacing:"0.12em"}}>
            {running?`EXECUTANDO — ${running}`:"LOG DE SAÍDA"}
          </span>
        </div>
        {log.length>0&&<button onClick={()=>setLog([])}
          style={{background:"transparent",border:"1px solid #1e2d3d",borderRadius:4,
            padding:"3px 10px",color:"#475569",fontSize:10,cursor:"pointer",fontFamily:MF}}>
          Limpar
        </button>}
      </div>
      <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"14px 18px",fontFamily:MF,fontSize:12,lineHeight:1.7}}>
        {log.length===0
          ?<div style={{color:"#1e2d3d",textAlign:"center",paddingTop:60,fontSize:13}}>
              Nenhuma execução ainda.<br/>
              <span style={{fontSize:11,color:"#0f1923"}}>Clique em "Gerar todos" ou em um arquivo específico.</span>
            </div>
          :log.map((line,i)=>{
            const isErr=line.includes("[ERRO]")||line.includes("✗")||line.includes("sem tradução")&&line.includes("!");
            const isOk=line.includes("✓")||line.includes("[100%]");
            const isPct=/\[\s*\d+%\]/.test(line);
            return <div key={i} style={{
              color:isErr?"#f87171":isOk?"#4ade80":isPct?"#0ea5e9":"#64748b",
              whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
              {line}
            </div>;
          })
        }
      </div>
    </div>
  </div>;
}

// MENU UI — strings de interface (sem diálogo)
// ══════════════════════════════════════════════════════════════
const MENU_FILES=["menu.txt","DataItem.txt","DataSkill.txt","DataEquip.txt","DataState.txt","DataTitle.txt","commonCommands.txt"];
function MenuScreen({onEdit,entries}){
  const [search,setSearch]=useState("");
  const [activeFile,setActiveFile]=useState("todos");
  const [editInline,setEditInline]=useState(null); // {id, val}

  const menuEntries=useMemo(()=>entries.filter(e=>MENU_FILES.some(f=>e.arquivo===f)),[entries]);

  const fileList=useMemo(()=>{
    const counts={};
    menuEntries.forEach(e=>{counts[e.arquivo]=(counts[e.arquivo]||0)+1;});
    return Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]));
  },[menuEntries]);

  const filtered=useMemo(()=>{
    let arr=activeFile==="todos"?menuEntries:menuEntries.filter(e=>e.arquivo===activeFile);
    if(search){
      const q=search.toLowerCase();
      arr=arr.filter(e=>(e.full_key||"").toLowerCase().includes(q)||(e.eng||"").toLowerCase().includes(q)||(e.pt||"").toLowerCase().includes(q));
    }
    return arr;
  },[menuEntries,activeFile,search]);

  // Group by namespace
  const grouped=useMemo(()=>{
    const g={};
    filtered.forEach(e=>{
      const ns=e.full_key.split("/")[0]||"Outros";
      if(!g[ns]) g[ns]=[];
      g[ns].push(e);
    });
    return g;
  },[filtered]);

  const nsKeys=Object.keys(grouped).sort();
  const totalMenu=menuEntries.length;
  const missingPt=menuEntries.filter(e=>!e.pt).length;

  return <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
    {/* Sidebar de arquivos */}
    <div style={{width:190,background:"#04080f",borderRight:"1px solid #1e2d3d",
      overflowY:"auto",padding:"12px 8px",flexShrink:0}}>
      <div style={{color:"#334155",fontSize:10,letterSpacing:"0.15em",
        fontFamily:"'JetBrains Mono',monospace",padding:"4px 8px",marginBottom:6}}>ARQUIVOS</div>
      {[["todos",totalMenu],...fileList].map(([f,n])=>{
        const active=activeFile===f;
        return <button key={f} onClick={()=>setActiveFile(f)} style={{
          width:"100%",textAlign:"left",padding:"7px 10px",borderRadius:6,
          background:active?"#0f1923":"transparent",
          border:active?"1px solid #1e2d3d":"1px solid transparent",
          color:active?"#e2e8f0":"#475569",cursor:"pointer",
          display:"flex",justifyContent:"space-between",alignItems:"center",
          fontSize:11,fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>
          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f}</span>
          <span style={{background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:3,
            padding:"0 5px",fontSize:10,color:"#334155",flexShrink:0,marginLeft:4}}>{n}</span>
        </button>;
      })}
    </div>
    {/* Conteúdo */}
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Toolbar */}
      <div style={{padding:"10px 18px",borderBottom:"1px solid #1e2d3d",background:"#090e14",
        display:"flex",gap:9,alignItems:"center"}}>
        <div style={{position:"relative",flex:1}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#334155",pointerEvents:"none"}}>
            <Icon name="search" size={12}/>
          </span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Buscar chave ou texto..."
            style={{width:"100%",paddingLeft:28,paddingRight:12,padding:"7px 12px 7px 28px",
              background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:7,
              color:"#e2e8f0",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}/>
        </div>
        <div style={{color:"#334155",fontSize:11,fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap"}}>
          <span style={{color:"#e2e8f0"}}>{filtered.length}</span> entradas
          {missingPt>0&&<span style={{color:"#f87171",marginLeft:10}}>· {missingPt} sem PT-BR</span>}
        </div>
      </div>
      {/* Grupos */}
      <div style={{flex:1,overflowY:"auto",padding:"12px 18px",display:"flex",flexDirection:"column",gap:14}}>
        {nsKeys.length===0&&<div style={{color:"#334155",fontFamily:"'JetBrains Mono',monospace",
          fontSize:13,textAlign:"center",paddingTop:40}}>Nenhuma entrada.</div>}
        {nsKeys.map(ns=><div key={ns}>
          {/* Cabeçalho do grupo */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{color:"#0ea5e9",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
              letterSpacing:"0.1em",fontWeight:700}}>{ns}</span>
            <span style={{color:"#1e2d3d",fontSize:10}}>/</span>
            <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
              {grouped[ns].length} itens</span>
            <div style={{flex:1,height:1,background:"#1e2d3d"}}/>
          </div>
          {/* Linhas do grupo */}
          <div style={{background:"#0a1018",border:"1px solid #1e2d3d",borderRadius:8,overflow:"hidden"}}>
            {grouped[ns].map((entry,i)=>{
              const isEditing=editInline&&editInline.id===entry.id;
              const missingThis=!entry.pt;
              return <div key={entry.id} style={{
                display:"grid",gridTemplateColumns:"200px 1fr 1fr 80px",
                padding:"8px 14px",
                borderBottom:i<grouped[ns].length-1?"1px solid #0f1923":"none",
                alignItems:"center",gap:8,
                background:missingThis?"rgba(239,68,68,0.03)":"transparent"}}>
                {/* Subkey */}
                <div style={{color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                  title={entry.full_key}>{entry.full_key.split("/").slice(1).join("/")}</div>
                {/* ENG */}
                <div style={{color:"#94a3b8",fontSize:12,fontFamily:"'JetBrains Mono',monospace",
                  lineHeight:1.5}}>{entry.eng||<span style={{color:"#334155",fontStyle:"italic"}}>—</span>}</div>
                {/* PT-BR inline edit */}
                <div>
                  {isEditing
                    ?<input autoFocus value={editInline.val}
                        onChange={e=>setEditInline({...editInline,val:e.target.value})}
                        onKeyDown={e=>{if(e.key==="Enter"){/* save via button */}if(e.key==="Escape")setEditInline(null);}}
                        style={{width:"100%",background:"#060c12",border:"1px solid #0ea5e9",
                          borderRadius:5,padding:"5px 9px",color:"#e2e8f0",fontSize:12,
                          fontFamily:"'JetBrains Mono',monospace"}}/>
                    :<span onClick={()=>setEditInline({id:entry.id,val:entry.pt||""})}
                        style={{color:missingThis?"#4b5563":entry.pt&&entry.pt!==entry.eng?"#4ade80":"#64748b",
                          fontSize:12,fontFamily:"'JetBrains Mono',monospace",lineHeight:1.5,
                          cursor:"text",display:"block",padding:"5px 0",
                          fontStyle:missingThis?"italic":"normal"}}>
                        {entry.pt||<span style={{color:"#4b5563"}}>— clique para traduzir —</span>}
                      </span>}
                </div>
                {/* Ações */}
                <div style={{display:"flex",gap:5}}>
                  {isEditing?<>
                    <button onClick={()=>{/* save */setEditInline(null);}} style={{
                      background:"rgba(34,197,94,0.1)",border:"1px solid #166534",
                      borderRadius:5,padding:"4px 9px",color:"#22c55e",fontSize:11,cursor:"pointer"}}>✓</button>
                    <button onClick={()=>setEditInline(null)} style={{
                      background:"transparent",border:"1px solid #1e2d3d",
                      borderRadius:5,padding:"4px 7px",color:"#475569",fontSize:11,cursor:"pointer"}}>✕</button>
                  </>:<button onClick={e=>{e.stopPropagation();onEdit(entry);}} style={{
                    background:"rgba(71,85,105,0.12)",border:"1px solid #1e2d3d",
                    borderRadius:5,padding:"4px 9px",color:"#64748b",fontSize:11,cursor:"pointer",
                    display:"flex",gap:3,alignItems:"center",fontFamily:"'JetBrains Mono',monospace"}}>
                    <Icon name="edit" size={10}/> editar
                  </button>}
                </div>
              </div>;
            })}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

// CONFIG
// ══════════════════════════════════════════════════════════════
const API_PRESETS={
  "gpt-4o-mini":{label:"GPT-4o-mini",provider:"OpenAI",url:"https://api.openai.com/v1/chat/completions",ph:"sk-...",color:"#22c55e"},
  "deepseek-chat":{label:"DeepSeek Chat",provider:"DeepSeek",url:"https://api.deepseek.com/v1/chat/completions",ph:"sk-ds-...",color:"#38bdf8"},
  "gpt-4o":{label:"GPT-4o",provider:"OpenAI",url:"https://api.openai.com/v1/chat/completions",ph:"sk-...",color:"#a78bfa"},
  "custom":{label:"Custom",provider:"",url:"",ph:"api-key-...",color:"#f59e0b"},
};
function SettingsScreen({apiModelo,onApiModelo,srvOnline,onSaveConfig}){
  const [modelo,setModelo]=useState(apiModelo||"gpt-4o-mini");
  const [keyOpenAI,setKeyOpenAI]=useState("");        // nova chave OpenAI digitada
  const [keyDeepSeek,setKeyDeepSeek]=useState("");    // nova chave DeepSeek digitada
  const [kiOpenAI,setKiOpenAI]=useState(null);        // metadados disco OpenAI
  const [kiDeepSeek,setKiDeepSeek]=useState(null);    // metadados disco DeepSeek
  // compat: keyInfo/apiKey/setApiKey apontam para o provedor ativo
  const isDeep = modelo.includes("deepseek");
  const keyInfo  = isDeep ? kiDeepSeek : kiOpenAI;
  const apiKey   = isDeep ? keyDeepSeek : keyOpenAI;
  const setApiKey= isDeep ? setKeyDeepSeek : setKeyOpenAI;
  const [showKey,setShowKey]=useState(false);
  const [lote,setLote]=useState(20);
  const [temp,setTemp]=useState(0.3);
  const [tout,setTout]=useState(60);
  const [customUrl,setCustomUrl]=useState("");
  const [saveState,setSaveState]=useState(null);  // null | "saving" | "ok" | "err"
  const [saveMsg,setSaveMsg]=useState("");

  // Carrega config real do servidor ao montar
  useEffect(()=>{
    if(!srvOnline) return;
    API.get("/api/config").then(cfg=>{
      if(cfg.modelo)                    { setModelo(cfg.modelo); if(onApiModelo) onApiModelo(cfg.modelo); }
      if(cfg.lote_size)                   setLote(cfg.lote_size);
      if(cfg.temperatura !== undefined)   setTemp(cfg.temperatura);
      if(cfg.timeout)                     setTout(cfg.timeout);
      if(cfg.base_url && modelo==="custom") setCustomUrl(cfg.base_url);
      // Metadados de AMBAS as chaves — nunca o valor real
      if(cfg.key_openai)   setKiOpenAI(cfg.key_openai);
      if(cfg.key_deepseek) setKiDeepSeek(cfg.key_deepseek);
    }).catch(()=>{});
  },[srvOnline]);

  // Sincroniza modelo com topbar
  useEffect(()=>{ if(apiModelo && apiModelo!==modelo) setModelo(apiModelo); },[apiModelo]);

  const handleModelChange=(v)=>{ setModelo(v); if(onApiModelo) onApiModelo(v); };
  const preset  = API_PRESETS[modelo] || API_PRESETS["custom"];
  const baseUrl = modelo==="custom" ? customUrl : preset.url;
  const keyOnDisk = keyInfo?.exists && !apiKey;  // chave salva, campo vazio

  const handleSave = async()=>{
    if(!srvOnline){
      setSaveState("err"); setSaveMsg("Servidor offline. Execute: python servidor.py");
      setTimeout(()=>{ setSaveState(null); setSaveMsg(""); }, 3500);
      return;
    }
    setSaveState("saving"); setSaveMsg("Gravando config.json em disco...");
    const cfg = {
      modelo,
      lote_size:        parseInt(lote),
      temperatura:      parseFloat(temp),
      timeout:          parseInt(tout),
      base_url:         baseUrl,
      api_key_openai:   keyOpenAI.trim(),   // vazio = servidor preserva
      api_key_deepseek: keyDeepSeek.trim(), // vazio = servidor preserva
    };
    try {
      const r = await API.post("/api/config", cfg);
      if(r.ok){
        if(r.key_openai)   { setKiOpenAI(r.key_openai);   setKeyOpenAI(""); }
        if(r.key_deepseek) { setKiDeepSeek(r.key_deepseek); setKeyDeepSeek(""); }
        if(onApiModelo && r.modelo) onApiModelo(r.modelo);
        const ko = r.key_openai||{}; const kd = r.key_deepseek||{};
        const parts=[];
        if(ko.exists) parts.push("OpenAI: "+ko.hint);
        if(kd.exists) parts.push("DeepSeek: "+kd.hint);
        setSaveState("ok");
        setSaveMsg(parts.length ? "Salvo ✓ — "+parts.join("  |  ") : "Salvo ✓  —  Atenção: nenhuma API key configurada.");
      } else {
        setSaveState("err"); setSaveMsg(r.error || "Erro desconhecido");
      }
    } catch(e) {
      setSaveState("err"); setSaveMsg("Falha na conexão com o servidor");
    }
    setTimeout(()=>{ setSaveState(null); setSaveMsg(""); }, 4500);
  };

  return <div style={{padding:"28px 32px",overflowY:"auto",height:"100%",maxWidth:680}}>
    <div style={{color:"#475569",fontSize:11,letterSpacing:"0.18em",fontFamily:"'JetBrains Mono',monospace",marginBottom:6}}>CONFIGURAÇÕES</div>
    <h2 style={{color:"#f1f5f9",fontSize:20,fontWeight:700,marginBottom:4}}>config.json</h2>

    {/* Status servidor */}
    <div style={{marginBottom:22,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
      {srvOnline
        ? <span style={{color:"#22c55e"}}>✓ servidor online — alterações serão gravadas em disco</span>
        : <span style={{color:"#f97316"}}>⚠ servidor offline — execute: python servidor.py</span>}
    </div>

    {/* Preset cards */}
    <div style={{marginBottom:20}}>
      <label style={{display:"block",color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
        letterSpacing:"0.12em",marginBottom:10}}>MODELO / PROVEDOR</label>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {Object.entries(API_PRESETS).map(([key,p])=>{
          const active=modelo===key;
          return <button key={key} onClick={()=>handleModelChange(key)} style={{
            background:active?`${p.color}12`:"#0f1923",border:`1px solid ${active?p.color:"#1e2d3d"}`,
            borderRadius:8,padding:"10px 10px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
            <div style={{color:active?p.color:"#475569",fontSize:11,fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",marginBottom:3}}>{p.label}</div>
            <div style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{p.provider||"—"}</div>
          </button>;
        })}
      </div>
    </div>

    {/* API Keys — OpenAI e DeepSeek separados */}
    <div style={{marginBottom:16}}>
      <label style={{display:"block",color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
        letterSpacing:"0.12em",marginBottom:10}}>API KEYS</label>

      {/* Status resumido de ambas */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[
          {label:"OpenAI",ki:kiOpenAI,col:"#22c55e"},
          {label:"DeepSeek",ki:kiDeepSeek,col:"#38bdf8"},
        ].map(({label,ki,col})=>(
          <div key={label} style={{flex:1,padding:"6px 10px",
            background:ki?.exists?"rgba(10,30,10,0.4)":"rgba(30,10,10,0.3)",
            border:"1px solid "+(ki?.exists?col+"55":"#7f1d1d44"),borderRadius:6,
            display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10}}>{ki?.exists?"🔑":"○"}</span>
            <span style={{color:ki?.exists?col:"#ef4444",fontSize:10,
              fontFamily:"'JetBrains Mono',monospace"}}>
              {label}: {ki?.exists?ki.hint+" · "+ki.len+"ch":"não configurada"}
            </span>
          </div>
        ))}
      </div>

      {/* Campo OpenAI */}
      <div style={{marginBottom:9}}>
        <div style={{color:"#22c55e",fontSize:10,fontFamily:"'JetBrains Mono',monospace",
          marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontWeight:700}}>OpenAI</span>
          <span style={{color:"#1e2d3d"}}>GPT-4o / GPT-4o-mini</span>
          {kiOpenAI?.exists&&!keyOpenAI&&<span style={{color:"#166534",fontSize:9,
            background:"rgba(34,197,94,0.1)",border:"1px solid #166534",borderRadius:3,padding:"0 4px"}}>✓ salva</span>}
        </div>
        <div style={{position:"relative"}}>
          <input type={showKey?"text":"password"} value={keyOpenAI}
            onChange={e=>setKeyOpenAI(e.target.value)}
            placeholder={kiOpenAI?.exists?`Nova (vazio = manter ${kiOpenAI.hint})`:"sk-proj-..."}
            style={{width:"100%",boxSizing:"border-box",background:"#0f1923",
              border:"1px solid "+(keyOpenAI?"#0ea5e9":kiOpenAI?.exists?"#166534":"#1e2d3d"),
              borderRadius:7,color:"#e2e8f0",padding:"8px 40px 8px 12px",
              fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}/>
          <button onClick={()=>setShowKey(p=>!p)} style={{position:"absolute",right:9,top:"50%",
            transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#475569",padding:3}}>
            {showKey
              ?<svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              :<svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>}
          </button>
        </div>
        {keyOpenAI&&<div style={{marginTop:3,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#0ea5e9"}}>
          ✎ {keyOpenAI.length} chars
        </div>}
      </div>

      {/* Campo DeepSeek */}
      <div>
        <div style={{color:"#38bdf8",fontSize:10,fontFamily:"'JetBrains Mono',monospace",
          marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontWeight:700}}>DeepSeek</span>
          <span style={{color:"#1e2d3d"}}>deepseek-chat / deepseek-reasoner</span>
          {kiDeepSeek?.exists&&!keyDeepSeek&&<span style={{color:"#0369a1",fontSize:9,
            background:"rgba(56,189,248,0.1)",border:"1px solid #0369a1",borderRadius:3,padding:"0 4px"}}>✓ salva</span>}
        </div>
        <input type={showKey?"text":"password"} value={keyDeepSeek}
          onChange={e=>setKeyDeepSeek(e.target.value)}
          placeholder={kiDeepSeek?.exists?`Nova (vazio = manter ${kiDeepSeek.hint})`:"sk-ds-..."}
          style={{width:"100%",boxSizing:"border-box",background:"#0f1923",
            border:"1px solid "+(keyDeepSeek?"#0369a1":kiDeepSeek?.exists?"#0369a1":"#1e2d3d"),
            borderRadius:7,color:"#e2e8f0",padding:"8px 12px",
            fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}/>
        {keyDeepSeek&&<div style={{marginTop:3,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"#38bdf8"}}>
          ✎ {keyDeepSeek.length} chars
        </div>}
      </div>

      {/* Aviso global: nenhuma chave */}
      {srvOnline&&!kiOpenAI?.exists&&!kiDeepSeek?.exists&&!keyOpenAI&&!keyDeepSeek&&<div style={{marginTop:9,
        padding:"8px 12px",background:"rgba(239,68,68,0.07)",border:"1px solid #7f1d1d",borderRadius:7,
        color:"#f87171",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
        ⚠ Nenhuma API key configurada. A tradução não funcionará.
      </div>}
    </div>

    {/* Base URL custom */}
    {modelo==="custom" && <div style={{marginBottom:16}}>
      <label style={{display:"block",color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
        letterSpacing:"0.12em",marginBottom:7}}>BASE URL</label>
      <input value={customUrl} onChange={e=>setCustomUrl(e.target.value)} placeholder="https://..."
        style={{width:"100%",boxSizing:"border-box",background:"#0f1923",border:"1px solid #1e2d3d",
          borderRadius:7,color:"#e2e8f0",padding:"9px 12px",fontSize:13,
          fontFamily:"'JetBrains Mono',monospace"}}/>
    </div>}

    {/* Numéricos */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
      {[{label:"Lote",key:"lote",val:lote,set:setLote,min:1,max:50},
        {label:"Temperatura",key:"temp",val:temp,set:setTemp,min:0,max:1,step:0.1},
        {label:"Timeout (s)",key:"tout",val:tout,set:setTout,min:10,max:300}
      ].map(f=><div key={f.key}>
        <label style={{display:"block",color:"#475569",fontSize:11,fontFamily:"'JetBrains Mono',monospace",
          letterSpacing:"0.12em",marginBottom:7}}>{f.label}</label>
        <input type="number" value={f.val} min={f.min} max={f.max} step={f.step||1}
          onChange={e=>f.set(Number(e.target.value))}
          style={{width:"100%",background:"#0f1923",border:"1px solid #1e2d3d",borderRadius:7,
            color:"#e2e8f0",padding:"9px 12px",fontSize:13,fontFamily:"'JetBrains Mono',monospace"}}/>
      </div>)}
    </div>

    {/* Preview JSON */}
    <div style={{marginBottom:18,padding:"14px 18px",background:"#0f1923",border:"1px solid #1e2d3d",
      borderRadius:8,fontFamily:"'JetBrains Mono',monospace",fontSize:12,lineHeight:1.9}}>
      <div style={{color:"#334155",marginBottom:6}}>// preview config.json</div>
      <div style={{color:"#4ade80"}}>{"{"}</div>

// APP
// ══════════════════════════════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("pipeline");
  const [editEntry,setEditEntry]=useState(null);
  const [logCol,setLogCol]=useState(true);
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(true);
  const [srvOnline,setSrvOnline]=useState(false);
  const [dbStatus,setDbStatus]=useState({db1:false,db2:false,db2b:false,db3:false});
  const [dbStats,setDbStats]=useState({});
  const [langsDisponiveis,setLangsDisponiveis]=useState(["eng","pt","cht","kor","rus","ukt"]);
  const [refLang,setRefLang]=useState("cht");
  const [apiModelo,setApiModelo]=useState("gpt-4o-mini");
  const [savedToast,setSavedToast]=useState(null);
  const [logLines,setLogLines]=useState(MOCK_LOG);
  const [pipeRunning,setPipeRunning]=useState(null);
  const [tagsSaida,setTagsSaida]=useState({estado:"idle",resultado:null}); // verificador tags PT-BR

  // Carrega dados do servidor ao iniciar
  useEffect(()=>{
    (async()=>{
      try{
        const st=await API.get("/api/status");
        setSrvOnline(true);
        setDbStatus(st.dbs||{});
        setDbStats(st.stats||{});
        if(st.langs){
          // Garante que todos os idiomas com dados no DB2 aparecem no seletor,
          // mesmo que o servidor não retorne "ukt" por estar sem dados parciais
          const ALL_LANGS=["eng","pt","cht","kor","rus","ukt","ptbrc"];
          const statsLangs=st.stats||{};
          const fromStats=ALL_LANGS.filter(l=>{
            if(l==="pt") return true; // PT-BR sempre presente
            if(l==="eng") return true;
            const key="db2_n_"+l;
            return (statsLangs[key]||0)>0;
          });
          // Une os dois: idiomas do servidor + idiomas confirmados pelos stats
          const merged=[...new Set([...st.langs,...fromStats])];
          setLangsDisponiveis(merged);
        }
        const cfg=await API.get("/api/config").catch(()=>({}));
        if(cfg.modelo) setApiModelo(cfg.modelo);
        const dat=await API.get("/api/entries");
        setEntries(dat.entries||[]);
      }catch(e){
        setSrvOnline(false);
      }finally{
        setLoading(false);
      }
    })();
  },[]);

  // Salvar entrada — persiste no banco se servidor online
  const handleSave=useCallback((id,newPt)=>{
    const entry=entries.find(e=>e.id===id);
    // Preserva status_revisao — edição manual NÃO remove marcação de revisão
    // status_revisao só muda via botão ⚑ (marcar/desmarcar) explícito
    const revisaoAtual = entry?.status_revisao||"";
    setEntries(prev=>prev.map(e=>e.id===id
      ?{...e,pt:newPt,status:"traduzido",tags_ok:1,modelo:"manual",
        status_revisao:revisaoAtual}
      :e));
    setSavedToast(id);
    setTimeout(()=>setSavedToast(null),2000);
    if(srvOnline&&entry){
      API.post("/api/save",{arquivo:entry.arquivo,full_key:entry.full_key,
        texto_eng:entry.eng||"",texto_ptbr:newPt,modelo_usado:"manual"}).catch(()=>{});
    }
  },[srvOnline,entries]);

  // Executar step do pipeline — SSE streaming (log em tempo real)
  const handlePipeline=useCallback((step,opts={})=>{
    if(!srvOnline) return Promise.resolve({ok:false,error:"Servidor offline — execute: python servidor.py"});
    setPipeRunning(step);
    setLogCol(false);
    const params=new URLSearchParams({modelo:apiModelo,...Object.fromEntries(
      Object.entries(opts).filter(([,v])=>v!=null&&v!=="")
    )});
    return new Promise((resolve)=>{
      let es;
      try{ es=new EventSource(`/api/pipeline/${step}/stream?${params}`); }
      catch(e){ setPipeRunning(null); resolve({ok:false,error:String(e)}); return; }
      const RELOAD_STEPS=["traduzir","traduzir_teste","reenviar","traduzir_gpt","traduzir_gpt_teste","reenviar_gpt","traduzir_ds","traduzir_ds_teste","reenviar_ds","extrator","extrator_db2","atualizador","gerador","gerador_dry","gerador_rel"];
      es.onmessage=(ev)=>{
        try{
          const d=JSON.parse(ev.data);
          if(d.ping) return;  // keep-alive
          if(d.line) setLogLines(prev=>[...prev,d.line].slice(-500));
          if(d.done){
            es.close(); setPipeRunning(null);
            if(d.returncode===0&&RELOAD_STEPS.includes(step)){
              setTimeout(()=>{
                API.get("/api/entries").then(dat=>{
                  if(dat?.entries){
                    setEntries(prev=>{
                      const lm=new Map(prev.map(e=>[e.id,e]));
                      return dat.entries.map(s=>{
                        const l=lm.get(s.id);
                        if(!l) return s;
                        return {...s,
                          status_revisao:l.status_revisao||s.status_revisao||"",
                          modelo:l.modelo==="manual"?"manual":s.modelo||l.modelo||""};
                      });
                    });
                    setSavedToast("reload");
                    setTimeout(()=>setSavedToast(null),3000);
                  }
                }).catch(()=>{});
              },800);
              API.get("/api/status").then(st=>{
                if(st?.dbs)setDbStatus(st.dbs);
                if(st?.stats)setDbStats(st.stats);
                if(st?.langs)setLangsDisponiveis(st.langs);
              }).catch(()=>{});
            }
            resolve({ok:d.returncode===0,returncode:d.returncode});
          }
        }catch(e){}
      };
      es.onerror=()=>{
        es.close(); setPipeRunning(null);
        setLogLines(prev=>[...prev,"[ERR] SSE desconectado — verifique se servidor.py está rodando"].slice(-500));
        resolve({ok:false,error:"SSE error"});
      };
    });
  },[srvOnline,apiModelo]);

  // Salvar config.json via API
  const handleSaveConfig=useCallback(async(cfg)=>{
    if(!srvOnline) return false;
    const r=await API.post("/api/config",cfg).catch(()=>({ok:false}));
    if(r.ok&&cfg.modelo) setApiModelo(cfg.modelo);
    return r.ok||false;
  },[srvOnline]);

  // Marcar/desmarcar revisão humana
  const handleRevisao=useCallback((id,status_revisao,nota,modelo=null)=>{
    const entry=entries.find(e=>e.id===id);
    setEntries(prev=>prev.map(e=>e.id===id?{
      ...e,status_revisao,nota_revisor:nota,
      ...(modelo!==null?{modelo}:{})
    }:e));
    if(srvOnline&&entry){
      API.post("/api/revisao/save",{entradas:[{
        arquivo:entry.arquivo,full_key:entry.full_key,
        status_revisao,...(modelo!==null?{modelo}:{})
      }]}).catch(()=>{});
    }
  },[srvOnline,entries]);

  // Ref lang topbar — idiomas reais do DB2 (exceto PT-BR que é o alvo)
  const LANG_LABELS_TOP={"eng":"ENG","cht":"CHT","kor":"KOR","rus":"RUS","ukt":"UKR","ptbrc":"PT-BRC"};
  const LANG_OPTS=langsDisponiveis.filter(l=>l!=="pt").map(l=>({val:l,label:LANG_LABELS_TOP[l]||l.toUpperCase()}));
  // API_OPTS: val = modelo, provider define qual script Python é chamado
  const API_OPTS=[
    {val:"gpt-4o-mini",      label:"GPT-mini",  color:"#22c55e", provider:"gpt"},
    {val:"deepseek-chat",    label:"DeepSeek",  color:"#38bdf8", provider:"deepseek"},
    {val:"gpt-4o",           label:"GPT-4o",    color:"#a78bfa", provider:"gpt"},
    {val:"google-translate", label:"🌐",        color:"#4ade80", provider:"google"},
  ];
  const curApi=API_OPTS.find(a=>a.val===apiModelo)||API_OPTS[0];
  const nav=[
    {id:"pipeline",icon:"pipeline",label:"Pipeline"},
    {id:"viewer",icon:"eye",label:"Visualizar",badge:"revisao"},
    {id:"problems",icon:"alert",label:"Problemas",badge:"erros"},
    {id:"menus",icon:"menu_ui",label:"Menus UI"},
    {id:"export",icon:"export",label:"Exportar"},
    {id:"settings",icon:"settings",label:"Config"},
  ];

  if(loading) return <div style={{height:"100vh",background:"#060c12",display:"flex",
    alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
    <div style={{width:34,height:34,border:"3px solid #1e2d3d",borderTopColor:"#0ea5e9",
      borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <span style={{color:"#334155",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>
      Conectando ao servidor...
    </span>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;

  const errCount=entries.filter(e=>e.status==="erro").length;
  const revCount=entries.filter(e=>e.status_revisao==="pendente").length;

  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>

    {/* Banner offline */}
    {!srvOnline&&<div style={{background:"#1c0a00",borderBottom:"1px solid #7c2d12",
      padding:"5px 18px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
      <span style={{color:"#f97316",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
        ⚠ Servidor offline — dados fictícios.
      </span>
      <span style={{color:"#7c2d12",fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
        Execute:  python servidor.py  (ou opção [5] no MENU.bat)
      </span>
    </div>}

    {/* TOPBAR */}
    <div style={{height:44,background:"#04080f",borderBottom:"1px solid #1e2d3d",
      display:"flex",alignItems:"center",padding:"0 16px",gap:10,flexShrink:0}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:26,height:26,background:"linear-gradient(135deg,#0ea5e9,#6366f1)",
          borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:12,fontWeight:700,color:"white"}}>L</div>
        <span style={{color:"#f1f5f9",fontWeight:700,fontSize:14}}>LonaRPG</span>
        <span style={{color:"#1e2d3d"}}>·</span>
        <span style={{color:"#334155",fontSize:13}}>Translator PT-BR</span>
      </div>
      <div style={{width:1,height:22,background:"#1e2d3d"}}/>
      {/* DB status real */}
      <div style={{display:"flex",gap:8}}>
        {[{k:"db1",l:"DB1"},{k:"db2",l:"DB2"},{k:"db2b",l:"DB2b"},{k:"db3",l:"DB3"}].map(d=>
          <div key={d.k} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:6,height:6,borderRadius:"50%",display:"block",
              background:srvOnline?(dbStatus[d.k]?"#22c55e":"#4b5563"):"#4b5563",
              boxShadow:srvOnline&&dbStatus[d.k]?"0 0 5px #22c55e":"none"}}/>
            <span style={{color:srvOnline&&dbStatus[d.k]?"#334155":"#4b5563",fontSize:11,
              fontFamily:"'JetBrains Mono',monospace"}}>{d.l}</span>
          </div>)}
      </div>
      <div style={{flex:1}}/>
      {/* API pills */}
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}}>API</span>
        {API_OPTS.map(a=>{const ac=apiModelo===a.val;return <button key={a.val} onClick={()=>setApiModelo(a.val)} style={{
          padding:"3px 8px",borderRadius:5,fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontWeight:ac?700:400,
          background:ac?`${a.color}18`:"transparent",
          border:ac?`1px solid ${a.color}55`:"1px solid transparent",
          color:ac?a.color:"#475569",transition:"all 0.12s"}}>{a.label}</button>;})}
      </div>
      <div style={{width:1,height:22,background:"#1e2d3d"}}/>
      {/* Ref lang pills */}
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{color:"#334155",fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}}>Ref</span>
        {LANG_OPTS.filter(l=>l.val!=="pt").map(l=>{const ac=refLang===l.val;return <button key={l.val} onClick={()=>setRefLang(l.val)} style={{
          padding:"3px 7px",borderRadius:5,fontSize:11,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",fontWeight:ac?700:400,
          background:ac?"#0ea5e918":"transparent",
          border:ac?"1px solid #0ea5e955":"1px solid transparent",
          color:ac?"#0ea5e9":"#475569",transition:"all 0.12s"}}>{l.label}</button>;})}
      </div>
      <div style={{width:1,height:22,background:"#1e2d3d"}}/>
      {/* Indicador servidor */}
      <div style={{display:"flex",alignItems:"center",gap:5}}>
        <span style={{width:7,height:7,borderRadius:"50%",display:"block",
          background:srvOnline?"#22c55e":"#ef4444",
          boxShadow:srvOnline?"0 0 6px #22c55e":"none",
          animation:pipeRunning?"pulse 1s infinite":undefined}}/>
        <span style={{color:srvOnline?"#334155":"#7f1d1d",fontSize:10,
          fontFamily:"'JetBrains Mono',monospace"}}>
          {pipeRunning?"executando...":srvOnline?"servidor":"offline"}
        </span>
      </div>
    </div>

    {/* BODY */}
    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      {/* SIDEBAR */}
      <div style={{width:54,background:"#04080f",borderRight:"1px solid #1e2d3d",
        display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0",gap:3,flexShrink:0}}>
        {nav.map(item=><button key={item.id} onClick={()=>setScreen(item.id)} title={item.label}
          style={{width:38,height:38,borderRadius:9,border:"none",
            background:screen===item.id?"#0f1923":"transparent",
            color:screen===item.id?"#0ea5e9":"#334155",cursor:"pointer",position:"relative",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name={item.icon} size={16}/>
          {item.badge==="erros"&&errCount>0&&<span style={{position:"absolute",top:6,right:6,
            width:7,height:7,borderRadius:"50%",background:"#ef4444",border:"1.5px solid #04080f"}}/>}
          {item.badge==="revisao"&&revCount>0&&<span style={{position:"absolute",top:6,right:6,
            width:7,height:7,borderRadius:"50%",background:"#f97316",border:"1.5px solid #04080f"}}/>}
          {screen===item.id&&<span style={{position:"absolute",left:0,top:"22%",bottom:"22%",
            width:2,borderRadius:"0 2px 2px 0",background:"#0ea5e9"}}/>}
          {pipeRunning&&item.id==="pipeline"&&<span style={{position:"absolute",top:6,right:6,
            width:7,height:7,borderRadius:"50%",background:"#f59e0b",border:"1.5px solid #04080f",
            animation:"pulse 1s infinite"}}/>}
        </button>)}
      </div>

      {/* CONTEÚDO */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflow:"hidden"}}>
          {screen==="pipeline"&&<PipelineScreen entries={entries} srvOnline={srvOnline} dbStatus={dbStatus} dbStats={dbStats} onPipeline={handlePipeline} pipeRunning={pipeRunning} setPipeRunning={setPipeRunning} apiModelo={apiModelo} apiOpts={API_OPTS} setDbStatus={setDbStatus} setDbStats={setDbStats} setLangsDisponiveis={setLangsDisponiveis} setEntries={setEntries} langsDisponiveis={langsDisponiveis} refLang={refLang} tagsSaida={tagsSaida} setTagsSaida={setTagsSaida} onNavProblems={()=>setScreen("problems")}/>}
          {screen==="viewer"&&<ViewerScreen onEdit={setEditEntry} entries={entries} setEntries={setEntries} onPipeline={handlePipeline} langs={langsDisponiveis} srvOnline={srvOnline} dbStatus={dbStatus} setDbStatus={setDbStatus} setDbStats={setDbStats} setLangsDisponiveis={setLangsDisponiveis} apiModelo={apiModelo} apiOpts={API_OPTS} refLang={refLang}/>}
          {screen==="problems"&&<ProblemsScreen onEdit={setEditEntry} entries={entries} langs={langsDisponiveis} onPipeline={handlePipeline} apiModelo={apiModelo} apiOpts={API_OPTS} srvOnline={srvOnline} pipeRunning={pipeRunning} setEntries={setEntries} setDbStats={setDbStats} setDbStatus={setDbStatus} setLangsDisponiveis={setLangsDisponiveis} tagsSaida={tagsSaida} setTagsSaida={setTagsSaida}/>}
          {screen==="menus"&&<MenuScreen onEdit={setEditEntry} entries={entries}/>}
          {screen==="export"&&<ExportScreen entries={entries} srvOnline={srvOnline} onPipeline={handlePipeline} pipeRunning={pipeRunning}/>}
          {screen==="settings"&&<SettingsScreen apiModelo={apiModelo} onApiModelo={setApiModelo} srvOnline={srvOnline} onSaveConfig={handleSaveConfig}/>}
        </div>
        <LogPanel collapsed={logCol} onToggle={()=>setLogCol(p=>!p)} logLines={logLines}/>
      </div>
    </div>

    {editEntry&&<EditorModal key={editEntry.id} entry={editEntry} refLang={refLang} onClose={()=>setEditEntry(null)} onSave={handleSave} onRevisao={handleRevisao} onPipeline={handlePipeline} apiModelo={apiModelo} apiOpts={API_OPTS}/>}

    {savedToast&&<div style={{position:"fixed",bottom:48,left:"50%",transform:"translateX(-50%)",
      background:"#0d2d1a",border:"1px solid #166534",borderRadius:8,
      padding:"9px 20px",color:"#4ade80",fontSize:12,fontFamily:"'JetBrains Mono',monospace",
      zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",display:"flex",gap:7,alignItems:"center"}}>
      <Icon name="check" size={13}/>
      {savedToast==="reload"?"✓ Entries atualizados":srvOnline?"✓ Salvo":"Salvo offline"}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
